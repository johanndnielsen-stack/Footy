<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#08080f"/>
<title>Footy Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c0c18;
  --surface:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.12);
  --border2:rgba(255,255,255,0.08);
  --text:#fff;
  --text2:#e8e8f0;
  --text3:#a0a0b8;
  --text4:#6e6e88;
  --text5:#4a4a60;

  /* accent = neon green variant (matches reference "green" variant) */
  --accent:#00f593;
  --accent2:#7c3aed;
  --accentGlow:rgba(0,245,147,0.3);
  --accent2Glow:rgba(124,58,237,0.35);
  --gradient:linear-gradient(135deg,#00f593 0%,#7c3aed 100%);
  --gradientCard:linear-gradient(135deg,rgba(0,245,147,0.12) 0%,rgba(124,58,237,0.08) 100%);

  /* card tier accents */
  --rookie:#00f593;
  --pro:#a78bfa;
  --legend:#f59e0b;

  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:calc(64px + var(--safe-bottom));
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;}
body{display:flex;justify-content:center;}
#root{height:100%;overflow:hidden;display:flex;flex-direction:column;width:100%;max-width:480px;position:relative;background:var(--bg);}
body::before{content:'';position:fixed;inset:0;background:var(--bg);z-index:-1;}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit;}
button:active{transform:scale(0.96);}
svg{display:block;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* ── HEADER ── */
#header{
  flex-shrink:0;padding:12px 16px 10px;
  background:var(--bg);border-bottom:1px solid var(--border2);
}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.header-sub{font-size:11px;color:var(--text4);letter-spacing:0.08em;text-transform:uppercase;font-weight:600;}
.header-title{font-size:20px;font-family:var(--font-display);color:var(--text);letter-spacing:0.04em;line-height:1.1;}
.header-avatar{
  width:34px;height:34px;border-radius:10px;
  background:var(--gradient);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 0 12px var(--accentGlow);
  flex-shrink:0;
}

/* ── SCREENS ── */
#screen-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen{padding:0 0 calc(16px + var(--nav-h));}

/* ── BOTTOM NAV ── */
#nav{
  flex-shrink:0;
  background:rgba(8,8,15,0.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px 6px;background:none;border:none;cursor:pointer;
  color:var(--text5);transition:color .15s;
  font-family:var(--font-body);
}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{transition:filter .15s;}
.nav-btn.active svg{filter:drop-shadow(0 0 6px var(--accent));}
.nav-label{font-size:9px;font-weight:400;}
.nav-btn.active .nav-label{font-weight:700;}
.nav-dot{width:16px;height:2px;border-radius:1px;background:var(--accent);margin-top:1px;}

/* ── NOTIFICATION ── */
#notif{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-100px);
  background:#0e0e1a;border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  color:var(--accent);padding:10px 22px;
  border-radius:100px;font-size:13px;font-weight:600;
  z-index:9999;white-space:nowrap;pointer-events:none;
  transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
#notif.show{transform:translateX(-50%) translateY(0);}

/* ── SECTION LABEL ── */
.sec-label{font-size:11px;color:var(--text4);letter-spacing:0.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px;}

/* ── HERO CARD ── */
.hero-card{
  margin:16px 16px 0;
  background:var(--gradient);
  border-radius:20px;padding:20px;
  position:relative;overflow:hidden;
}
.hero-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08);}
.hero-card::after{content:'';position:absolute;bottom:-20px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.06);}
.hero-eyebrow{font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
.hero-pts{font-size:52px;font-family:var(--font-display);color:#fff;line-height:1;margin-top:4px;}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;}
.hero-chips{display:flex;gap:8px;margin-top:14px;}
.hero-chip{background:rgba(0,0,0,0.25);border-radius:8px;padding:6px 12px;}
.hero-chip-lbl{font-size:10px;color:rgba(255,255,255,0.6);}
.hero-chip-val{font-size:16px;font-family:var(--font-display);color:#fff;}

/* ── GLASS CARD ── */
.glass-card{
  background:rgba(255,255,255,0.06);border-radius:16px;
  padding:16px;border:1px solid var(--border);
}
.glass-card-sm{
  background:rgba(255,255,255,0.06);border-radius:14px;
  padding:12px 14px;border:1px solid var(--border);
}

/* ── ACCENT CARD ── */
.accent-card{
  background:var(--gradientCard);
  border:1px solid rgba(0,245,147,0.15);
  border-radius:16px;padding:14px 16px;
}

/* ── BUTTONS ── */
.btn-primary{
  width:100%;padding:14px;border-radius:14px;
  background:var(--gradient);border:none;
  color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:0.04em;
  box-shadow:0 4px 20px var(--accentGlow);
  font-family:var(--font-body);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:active{transform:scale(0.97);box-shadow:0 2px 10px var(--accentGlow);}
.btn-ghost{
  padding:10px 20px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;font-family:var(--font-body);
  transition:all .15s;
}
.btn-ghost:active{transform:scale(0.96);}
.btn-ghost.accent{color:var(--accent);border-color:rgba(0,245,147,0.3);}
.btn-ghost.accent2{color:var(--accent2);border-color:rgba(124,58,237,0.3);}
.btn-ghost.gold{color:var(--legend);border-color:rgba(245,158,11,0.3);}
.btn-ghost.danger{color:#f87171;border-color:rgba(248,113,113,0.3);}
.btn-ghost.dim{color:var(--text5);border-color:rgba(255,255,255,0.05);cursor:not-allowed;}
.btn-ghost.full{width:100%;text-align:center;justify-content:center;display:flex;align-items:center;gap:8px;}
.btn-ghost.sm{padding:7px 14px;font-size:12px;border-radius:9px;}

/* ── STAT PILLS ── */
.stat-pills{display:flex;gap:8px;}
.stat-pill{flex:1;background:var(--surface);border-radius:10px;padding:10px 8px;text-align:center;}
.stat-pill-val{font-size:18px;font-weight:700;color:var(--accent);}
.stat-pill-lbl{font-size:10px;color:var(--text4);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}

/* ── PLAYER ROW ── */
.player-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;
}
.player-avatar{
  width:38px;height:38px;border-radius:12px;
  background:var(--gradientCard);
  border:1px solid var(--accentGlow);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;
}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border-radius:14px;
  padding:14px 16px;border:1px solid var(--border);
  margin-bottom:10px;
}

/* ── LEAGUE ROW ── */
.league-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--border2);
  position:relative;
}
.league-row.top{padding-left:10px;}
.league-row.top::before{
  content:'';position:absolute;left:0;top:50%;
  transform:translateY(-50%);
  width:3px;height:24px;border-radius:2px;background:var(--accent);
}

/* ── CARDS ── */
.card-mini{
  flex-shrink:0;width:86px;
  background:var(--surface);
  border:1px solid var(--card-border,var(--border));
  border-radius:14px;padding:8px;text-align:center;
  position:relative;overflow:hidden;transition:transform .15s;
}
.card-mini::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--card-accent,var(--accent)),transparent);opacity:.4;}
.card-mini:active{transform:scale(0.94);}

.card-full{
  width:100%;max-width:230px;min-width:140px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--card-border,var(--border));
  border-radius:20px;overflow:hidden;position:relative;
  box-shadow:0 0 40px var(--card-glow,rgba(0,245,147,.15)),0 20px 60px rgba(0,0,0,.8);
}
.card-full-art{
  width:100%;aspect-ratio:3/4;max-height:220px;position:relative;overflow:hidden;
}
.card-full-art img{
  width:100%;height:100%;object-fit:cover;object-position:center top;display:block;border-radius:12px 12px 0 0;
}

/* ── TRIVIA ── */
.q-opt{
  width:100%;padding:15px 18px;border-radius:14px;text-align:left;
  font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--text2);
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
  transition:all .2s;min-height:52px;cursor:pointer;
}
.q-opt:hover{border-color:var(--q-color);color:var(--text);background:rgba(255,255,255,0.06);}
.q-opt.correct{border-color:var(--rookie)!important;color:var(--rookie)!important;background:rgba(0,245,147,0.07)!important;}
.q-opt.wrong{border-color:#f87171!important;color:#f87171!important;background:rgba(248,113,113,0.07)!important;}
.q-opt.hidden{opacity:0;pointer-events:none;}
.q-prog{height:3px;border-radius:3px;flex:1;transition:background .3s;}

/* ── STAT BARS ── */
.stat-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.stat-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.xp-bg{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:4px;}
.xp-fill{height:100%;border-radius:2px;background:var(--gradient);}

/* ── PITCH ── */
.pitch-bg{
  background:linear-gradient(180deg,#0a2e14 0%,#0d3d1a 50%,#0a2e14 100%);
  border-radius:20px;padding:16px 8px;
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:2px 7px;font-size:9px;letter-spacing:.5px;}

/* ── API BANNER ── */
.api-banner{
  margin:0 16px 0;
  background:linear-gradient(135deg,rgba(0,245,147,0.08),rgba(124,58,237,0.06));
  border:1px solid rgba(0,245,147,0.15);
  border-radius:16px;padding:14px 16px;
}
.api-input{
  width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:10px 14px;color:var(--text2);
  font-family:monospace;font-size:12px;outline:none;margin-top:10px;
  transition:border-color .2s;
}
.api-input:focus{border-color:var(--accent);}

/* ── PORTRAIT / SHIMMER ── */
.shimmer{
  background:linear-gradient(110deg,#0d0f1e 30%,#181b2e 50%,#0d0f1e 70%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease infinite;
}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
  position:absolute;bottom:8px;right:8px;
}

/* ── OPP ROW ── */
.opp-row{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:13px 16px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;cursor:pointer;transition:all .2s;
}
.opp-row:hover{border-color:rgba(255,255,255,0.15);transform:translateX(3px);}
.opp-row.selected{border-color:var(--legend);background:rgba(245,158,11,0.06);}
.opp-row:active{transform:scale(0.98);}

/* ── EVENT LOG ── */
.event-log{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:14px;padding:12px;
  max-height:240px;overflow-y:auto;font-size:11px;
}
.event-row{padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;align-items:flex-start;}
.event-row:last-child{border-bottom:none;}

/* ── VIDEO BACKGROUND ── */
.home-video-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;overflow:hidden;
}
.home-video-bg video{
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 1.5s ease;
}
.home-video-bg video.loaded{opacity:1;}
.home-video-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(8,8,15,0.55) 0%,
    rgba(8,8,15,0.35) 30%,
    rgba(8,8,15,0.5)  70%,
    rgba(8,8,15,0.85) 100%
  );
}
/* Lift home screen content above video */
.home-screen-content{position:relative;z-index:1;}
/* Make hero card glass when video is showing */
.video-active .hero-card{
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.video-active .hero-pts{text-shadow:0 2px 20px rgba(0,0,0,0.8);}
.video-active .glass-card{
  background:rgba(8,8,15,0.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.video-active .btn-primary{box-shadow:0 4px 24px rgba(0,245,147,0.4);}

.dev-glow{box-shadow:0 0 20px rgba(0,245,147,.3),0 0 60px rgba(0,245,147,.1)!important;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .4s cubic-bezier(.2,.8,.4,1) forwards;}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}

/* Stagger */
.stagger>*{opacity:0;animation:fadeUp .4s cubic-bezier(.2,.8,.4,1) forwards;}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.12s}
.stagger>*:nth-child(4){animation-delay:.16s}
.stagger>*:nth-child(5){animation-delay:.2s}
.stagger>*:nth-child(6){animation-delay:.24s}

/* ── FATIGUE / INJURY BADGE ── */
.status-pip{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-fresh{background:#00f593;box-shadow:0 0 5px rgba(0,245,147,.6);}
.status-tired{background:#f59e0b;box-shadow:0 0 5px rgba(245,158,11,.6);}
.status-injured{background:#f87171;box-shadow:0 0 5px rgba(248,113,113,.6);}
.status-inform{background:#a78bfa;box-shadow:0 0 5px rgba(167,139,250,.6);}
.fatigue-bar-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:3px;}
.fatigue-bar-fill{height:100%;border-radius:2px;transition:width .6s;}

/* ── LIVE MATCH FEED ── */
.live-feed{display:flex;flex-direction:column;gap:8px;padding:0 16px;}
.live-score-bar{
  margin:0 16px 12px;
  background:rgba(255,255,255,0.07);
  border-radius:18px;padding:18px 20px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.live-event-card{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  animation:slideIn .3s cubic-bezier(.2,.8,.4,1) forwards;
}
.live-event-card.goal{border-color:rgba(0,245,147,0.35);background:rgba(0,245,147,0.07);}
.live-event-card.goal-opp{border-color:rgba(248,113,113,0.35);background:rgba(248,113,113,0.07);}
.live-event-card.def{border-color:rgba(96,165,250,0.25);background:rgba(96,165,250,0.05);}
.live-event-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center;}
.live-event-min{font-size:11px;font-weight:700;color:var(--text4);min-width:26px;}
.live-event-text{font-size:13px;font-weight:500;color:var(--text2);line-height:1.4;flex:1;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── COMIC PANELS (kept for fallback) ── */
.comic-wrap{padding:0;overflow:hidden;}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:#000;padding:3px;}
.panel{background:#0e0e20;position:relative;overflow:hidden;border-radius:4px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;}
.panel-wide{grid-column:span 2;aspect-ratio:2/1;}
.panel-text{font-size:10px;font-weight:700;text-align:center;letter-spacing:.5px;line-height:1.4;z-index:2;position:relative;}
.panel-bg{position:absolute;inset:0;opacity:.18;}
.panel-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.8);border-radius:4px;font-size:8px;font-weight:700;padding:2px 6px;letter-spacing:.5px;}
.panel-score{font-size:28px;font-family:var(--font-display);letter-spacing:4px;z-index:2;position:relative;}
.panel-action{font-size:32px;margin-bottom:4px;z-index:2;position:relative;}
@keyframes panelPop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.panel-in{animation:panelPop .3s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes goalFlash{0%,100%{background:#0e0e20}50%{background:#0e2b15}}
.panel-goal{animation:goalFlash .4s ease 2;}

/* ── TRANSFER MARKET ── */
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.market-card.featured{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04);}
.market-price{font-size:15px;font-family:var(--font-display);color:var(--legend);}
.market-sell-price{font-size:12px;color:var(--text3);}

/* ── PLAYER RATINGS ── */
.rating-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);}
.rating-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:var(--font-display);flex-shrink:0;}
.rating-a{background:rgba(0,245,147,.15);color:#00f593;}
.rating-b{background:rgba(167,139,250,.15);color:#a78bfa;}
.rating-c{background:rgba(245,158,11,.15);color:#f59e0b;}
.rating-d{background:rgba(248,113,113,.15);color:#f87171;}

/* ── TIMELINE ── */

let _ac=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function playTone(freq,dur,type="sine",vol=0.18,delay=0){
  try{
    const ac=getAC();const t=ac.currentTime+delay;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(ac.destination);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
function playNoise(dur,vol=0.06,delay=0){
  try{
    const ac=getAC();const t=ac.currentTime+delay;
    const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
    src.buffer=buf;f.type="bandpass";f.frequency.value=400;f.Q.value=0.5;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(f);f.connect(g);g.connect(ac.destination);src.start(t);src.stop(t+dur);
  }catch(e){}
}

// FATIGUE & INJURY SYSTEM
// ══════════════════════════════════════════════════════════
// fatigue: 0-100. >60=tired, >85=injury risk. Recovers +15 per trivia round.
// injuredFor: rounds remaining injured (0 = fit)
function getStatus(card){
  if((card.injuredFor||0)>0) return "injured";
  if((card.fatigue||0)>=60) return "tired";
  if((card.inForm||false)) return "inform";
  return "fresh";
}
function statusPip(card){
  const s=getStatus(card);
  const cls={fresh:"status-fresh",tired:"status-tired",injured:"status-injured",inform:"status-inform"}[s];
  return `<span class="status-pip ${cls}" title="${s}"></span>`;
}
function statusLabel(card){
  const s=getStatus(card);
  if(s==="injured") return `🔴 Injured (${card.injuredFor}r)`;
  if(s==="tired") return `🟡 Tired`;
  if(s==="inform") return `⚡ In Form`;
  return `🟢 Fresh`;
}
function cardMarketValue(card){
  const base=card.difficulty==="hard"?150:card.difficulty==="medium"?65:30;
  const s=getStatus(card);
  const lvlBonus=(card.level||1)*5;
  const formBonus=(card.inForm?20:0);
  const fatigPenalty=s==="tired"?-10:s==="injured"?-40:0;
  return Math.max(10, base + lvlBonus + formBonus + fatigPenalty + Math.round((card.overall-60)*0.8));
}
function cardSellPrice(card){ return Math.round(cardMarketValue(card)*0.6); }
function applyFatigueToTeam(){
  state.team.forEach(c=>{
    if((c.injuredFor||0)>0){c.injuredFor--;return;}
    const fatigue=(c.fatigue||0);
    const injRisk=fatigue>85?0.22:fatigue>70?0.08:0;
    if(Math.random()<injRisk){c.injuredFor=ri(1,3);c.fatigue=20;c.inForm=false;}
    else{c.fatigue=Math.min(100,(c.fatigue||0)+ri(12,22));}
    c.inForm=false;
  });
}
function recoverFatigue(){
  state.team.forEach(c=>{
    if((c.injuredFor||0)>0){c.injuredFor=Math.max(0,(c.injuredFor||0)-1);return;}
    c.fatigue=Math.max(0,(c.fatigue||0)-15);
  });
}
function markInForm(cardId){
  const c=state.team.find(x=>x.id==cardId);
  if(c) c.inForm=true;
}

function refreshMarket(){

function buyCard(idx){
  const c=state.market[idx];
  if(!c)return;
  const price=cardMarketValue(c);
  if(state.points<price){notify("Not enough points! 💸","#f87171");return;}
  state.points-=price;
  state.collection.push(c);
  state.market.splice(idx,1);
  notify(`${c.name} signed! ⚽ -${price} pts`,"var(--accent)");
  render(true);
}
function listCard(cardId){
  const idx=state.collection.findIndex(c=>c.id==cardId);
  if(idx===-1)return;
  const c=state.collection[idx];
  if(state.team.some(t=>t.id===c.id)){notify("Remove from team first!","var(--legend)");return;}
  const sell=cardSellPrice(c);
  state.collection.splice(idx,1);
  state.points+=sell;
  notify(`Sold ${c.name} for ${sell} pts 💰`,"var(--legend)");
  render(true);
}

// Local league map: timezone country code → league id
const LOCAL_LEAGUE_MAP={
  GB:"premier_league", ES:"la_liga", DE:"bundesliga", IT:"serie_a",
  FR:"ligue_1", NL:"eredivisie", PT:"primeira_liga",
  DK:"superliga", SE:"allsvenskan", NO:"eliteserien",
  US:"mls", MX:"liga_mx", BR:"brasileirao", AR:"primera_division",
  JP:"j_league", AU:"a_league",
};
// Extended league names for prompt (only needed for non-LEAGUES entries)
const LOCAL_LEAGUE_NAMES={
  DK:"Danish Superliga", SE:"Allsvenskan", NO:"Eliteserien",
  US:"MLS", MX:"Liga MX", BR:"Brasileirão", AR:"Argentine Primera División",
  JP:"J1 League", AU:"A-League",
};

function detectLocalLeague(){
  try{
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||"";
    // Extract country hint from timezone (e.g. "Europe/Copenhagen" → "DK")
    const tzMap={
      "Europe/Copenhagen":"DK","Europe/Stockholm":"SE","Europe/Oslo":"NO",
      "Europe/London":"GB","Europe/Madrid":"ES","Europe/Berlin":"DE",
      "Europe/Rome":"IT","Europe/Paris":"FR","Europe/Amsterdam":"NL",
      "Europe/Lisbon":"PT","America/New_York":"US","America/Los_Angeles":"US",
      "America/Chicago":"US","America/Sao_Paulo":"BR","America/Argentina/Buenos_Aires":"AR",
      "America/Mexico_City":"MX","Asia/Tokyo":"JP","Australia/Sydney":"AU",
    };
    const cc=tzMap[tz];
    if(!cc) return null;
    const lid=LOCAL_LEAGUE_MAP[cc];
    if(!lid) return null;
    // Check if it's already in LEAGUES list
    const known=LEAGUES.find(l=>l.id===lid);
    if(known) return known;
    // Return synthetic entry for local league
    const flags={DK:"🇩🇰",SE:"🇸🇪",NO:"🇳🇴",US:"🇺🇸",MX:"🇲🇽",BR:"🇧🇷",AR:"🇦🇷",JP:"🇯🇵",AU:"🇦🇺"};
    return {id:lid, flag:flags[cc]||"🏟️", name:LOCAL_LEAGUE_NAMES[lid]||lid, country:cc, local:true};
  }catch(e){return null;}
}

function getLeagueList(){
  const local=detectLocalLeague();
  // If local is already in the main list, just mark it; else prepend it
  let list=[...LEAGUES];
  if(local && !LEAGUES.find(l=>l.id===local.id)){
    list=[{...local,local:true},...list];
  }
  return list;
}

function leagueName(id){
  const all=getLeagueList();
  return all.find(l=>l.id===id)?.name||"Football";
}

function setLeague(id){
  state.triviaLeague=id;
  localStorage.setItem("fc_league",id);
  // Resolve "auto" on first save
  if(id==="auto"){
    const local=detectLocalLeague();
    if(local){state.triviaLeague=local.id;localStorage.setItem("fc_league",local.id);}
  }
  render();
}

      method:"POST",headers:{"Content-Type":"application/json"},

async function friendLeaguePostResult(homeTeam,awayTeam,hg,ag){

  try{

      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({code:state.friendLeague.code,playerName:state.friendLeague.myName,homeTeam,awayTeam,hg,ag})
    });

    const myName=state.friendLeague.myName;
    state.friendLeague={...league,myName};
  }catch(e){
    console.warn("Could not sync result:",e.message);
  }
}

function friendLeagueTable(){
  const fl=state.friendLeague;
  if(!fl) return [];
  return [...fl.teams].map(t=>{
    let w=0,d=0,l=0,gf=0,ga=0;
    fl.fixtures.filter(f=>f.played).forEach(f=>{
      const isHome=f.home===t.name;
      const isAway=f.away===t.name;
      if(!isHome&&!isAway) return;
      const myG=isHome?f.hg:f.ag;
      const opG=isHome?f.ag:f.hg;
      gf+=myG; ga+=opG;
      if(myG>opG) w++; else if(myG===opG) d++; else l++;
    });
    return{...t,w,d,l,gf,ga,gd:gf-ga,pts:w*3+d,played:w+d+l};
  }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function getNextFriendFixture(){
  const fl=state.friendLeague;
  if(!fl) return null;
  const me=fl.myName;
  return fl.fixtures.find(f=>!f.played&&(f.home===me||f.away===me));
}

async function fetchTriviaQuestions(leagueId){

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=arr=>arr[Math.floor(Math.random()*arr.length)];

function genCard(diff){
  const pos=rf(POSITIONS),isGK=pos==="GK";
  const skills=isGK?SKILL_GK:SKILL_FIELD;
  const [lo,hi]=diff==="easy"?[45,65]:diff==="medium"?[65,82]:[82,99];
  const overall=ri(lo,hi);
  const stats={};
  skills.forEach(s=>stats[s]=ri(Math.max(40,overall-15),Math.min(99,overall+10)));
  return{
    id:Date.now()+Math.random(), name:`${rf(FIRST)} ${rf(LAST)}`,
    position:pos, nationality:rf(NATS), overall, stats, difficulty:diff, theme:THEMES[diff],
    jersey:rf(JERSEY_COLORS), skinTone:rf(SKIN_TONES), hairStyle:rf(HAIR_STYLES),
    xp:0, level:1, matches:0, goals:0, assists:0, achievements:[],
    portrait:null, portraitLoading:false,
  };
}
function genBotTeam(){
  return ["easy","easy","easy","medium","medium","medium","hard","hard","hard","easy","medium"]
    .map((d,i)=>{const c=genCard(d);c.position=POSITIONS[i];return c;});
}
function teamAvg(cards){return cards.length?Math.round(cards.reduce((s,c)=>s+c.overall,0)/cards.length):0;}
function xpPct(card){return Math.min(100,Math.round((card.xp%XP_PER_LEVEL)/XP_PER_LEVEL*100));}
function grantXP(card,amount){
  const changes=[];
  card.xp=(card.xp||0)+amount;
  const newLevel=Math.floor(card.xp/XP_PER_LEVEL)+1;
  if(newLevel>(card.level||1)){
    card.level=newLevel;
    const keys=Object.keys(card.stats);
    const key=rf(keys);
    const gain=card.difficulty==="easy"?ri(1,3):card.difficulty==="medium"?ri(1,2):1;
    if(card.stats[key]<99){
      card.stats[key]=Math.min(99,card.stats[key]+gain);
      const vals=Object.values(card.stats);
      const newOvr=Math.min(99,Math.round(vals.reduce((a,b)=>a+b,0)/vals.length));
      const ovrGain=newOvr-card.overall;
      card.overall=newOvr;
      changes.push({stat:key,gain,ovrGain});
      if(ovrGain>=3)grantAch(card,"breakout");
    }
  }
  if(card.xp>=100)grantAch(card,"century");
  return changes;
}
function grantAch(card,key){
  if(!card.achievements)card.achievements=[];
  if(!card.achievements.includes(key)){card.achievements.push(key);return true;}
  return false;
}

const IN_SANDBOX=location.href.startsWith("about:")||location.hostname==="www.claudeusercontent.com";
async function fetchPortrait(card){
  if(card.portrait||card.portraitLoading)return;
  if(IN_SANDBOX){fallback(card);return;}
  card.portraitLoading=true;
  updatePortraitEl(card.id,"loading",null,card);
  const nat=card.nationality.replace(/[^\w ]/g,"").trim();
  const tier=card.difficulty==="hard"?"elite veteran star":card.difficulty==="medium"?"professional":"young rising talent";
  const pose=ACTION_POSES[card.position]||ACTION_POSES.default;
  const col=colorName(card.jersey);
  const foil=card.difficulty==="hard"?"rose gold holographic foil border":card.difficulty==="medium"?"silver holographic foil border":"bronze foil border";
  const prompt=`Photorealistic soccer trading card, official premium sports card design, ${tier} ${nat} footballer, ${card.skinTone} skin tone, ${card.hairStyle} hair, ${pose}, professional stadium background with bokeh blurred crowd, dynamic motion blur on feet and ball, official kit with ${col} jersey, card with ${foil}, holographic shimmer texture on card surface, sharp focus on face, 4K ultra-detailed, sports photography style, Canon EF 85mm f1.4 lens, shallow depth of field, dramatic stadium lighting, cinematic`;
  try{
    const res=await fetch("/.netlify/functions/generate-art",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,parameters:{num_inference_steps:4,width:512,height:768}})
    });
    if(!res.ok){console.warn("Art function error:",res.status);fallback(card);return;}
    const blob=await res.blob();
    const reader=new FileReader();
    reader.onload=()=>{
      card.portrait=reader.result;
      card.portraitLoading=false;
      updatePortraitEl(card.id,"done",card.portrait,card);
      updateMiniCardAvatar(card);
    };
    reader.onerror=()=>fallback(card);
    reader.readAsDataURL(blob);
  }catch(e){console.warn("fetchPortrait failed:",e);fallback(card);}
}
function fallback(card){card.portrait="fallback";card.portraitLoading=false;updatePortraitEl(card.id,"fallback",null,card);}
function updatePortraitEl(cardId,st,src,cardRef){
  const el=document.getElementById(`cardart-${cardId}`);
  if(!el)return;
  // Remove only the art layer (identified by data-art attribute), leave overlay divs intact
  const prev=el.querySelector("[data-art]");
  if(prev)prev.remove();
  const artEl=document.createElement("div");
  artEl.dataset.art="1";
  artEl.style.cssText="position:absolute;top:0;left:0;width:100%;height:100%;";
  if(st==="loading"){
    artEl.innerHTML=`<div class="shimmer" style="width:100%;height:100%;border-radius:12px 12px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:rgba(255,255,255,.25);font-size:11px;letter-spacing:1px;">🎨<br/>GENERATING…</div><div class="spinner"></div>`;
  }else if(st==="done"&&src){
    artEl.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;border-radius:12px 12px 0 0;"/>`;
  }else{
    artEl.innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border-radius:12px 12px 0 0;">${cardRef?avSVG(cardRef,80):""}</div>`;
  }
  el.insertBefore(artEl,el.firstChild);
}
function updateMiniCardAvatar(card){
  // Find any rendered mini card for this card and swap in the portrait
  document.querySelectorAll(`.card-mini`).forEach(el=>{
    // match by card id stored in a data attribute if present, or by overall+name text
    if(el.dataset.cardId==card.id){
      const t=card.theme;
      const imgWrap=el.querySelector(".mini-avatar");
      if(imgWrap){
        imgWrap.innerHTML=`<img src="${card.portrait}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;"/>`;
      }
    }
  });
}
function colorName(hex){
  const m={"#e11d48":"red","#2563eb":"blue","#16a34a":"green","#9333ea":"purple","#ea580c":"orange","#0891b2":"cyan","#854d0e":"brown","#1e293b":"dark navy"};
  return m[hex]||"colourful";
}

function simulateMatch(myTeam,oppTeam,oppName,tacBonus=0){
  const myAvg=teamAvg(myTeam)+(tacBonus||0),oppAvg=teamAvg(oppTeam);

  // Formation bonus
  const formation=state.matchSetup?.formation||"4-4-2";
  const formBonus={attack:0,defence:0};
  if(formation==="4-3-3") formBonus.attack=5;
  if(formation==="4-5-1") formBonus.defence=5;
  if(formation==="3-5-2") formBonus.attack=2; // midfield dominance = slight attack edge

  // Captain bonus — captain's overall contributes +3 to team avg
  const captainId=state.matchSetup?.captain;
  const captainCard=captainId?myTeam.find(c=>c.id==captainId):null;
  const captainBonus=captainCard?3:0;

  const adjMyAvg=myAvg+formBonus.attack-formBonus.defence*0.5+captainBonus*0.3;
  const adjOppAvg=oppAvg+formBonus.defence*0.5-formBonus.attack*0.3;

  const events=[];let myG=0,oppG=0;
  const mins=[5,12,18,24,31,38,44,51,58,65,72,80,85,90].sort(()=>Math.random()-.5).slice(0,ri(8,12)).sort((a,b)=>a-b);
  const attackers=myTeam.filter(c=>["ST","LW","RW","CAM"].includes(c.position));
  const defenders=myTeam.filter(c=>["CB","LB","RB","GK"].includes(c.position));
  const mids=myTeam.filter(c=>c.position==="CM");
  const all=myTeam.length?myTeam:[genCard("easy")];
  const pEv={};

  // Captain gets priority in attack events
  const weightedAttackers=captainCard&&["ST","LW","RW","CAM"].includes(captainCard.position)
    ?[captainCard,captainCard,...attackers]:attackers;

  for(const min of mins){
    const myC=Math.max(0.12,Math.min(0.65,0.35+(adjMyAvg-adjOppAvg)*0.005));
    const opC=Math.max(0.1,Math.min(0.6,0.3+(adjOppAvg-adjMyAvg)*0.005));
    const roll=Math.random();
    if(roll<myC){
      const sc=rf(weightedAttackers.length?weightedAttackers:all);
      const as=rf(mids.length?mids:all.filter(c=>c.id!==sc.id));
      myG++;pEv[sc.id]=pEv[sc.id]||{g:0,a:0};pEv[sc.id].g++;
      if(as&&as.id!==sc.id){pEv[as.id]=pEv[as.id]||{g:0,a:0};pEv[as.id].a++;}
      events.push({type:"goal_my",text:`${min}' ⚽ ${sc.name} ${rf(GOAL_ACTIONS)}${as&&as.id!==sc.id?" ("+as.name.split(" ")[1]+"▶)":""}${sc.id===captainId?" 🅒":""}`});
    }else if(roll<myC+opC){
      oppG++;
      const oppAttackers=oppTeam.filter(c=>["ST","LW","RW","CAM"].includes(c.position));
      const oppScorer=rf(oppAttackers.length?oppAttackers:oppTeam);
      events.push({type:"goal_opp",text:`${min}' ⚽ ${oppScorer.name} ${rf(GOAL_ACTIONS)} (${oppName})`});
    }else if(Math.random()<0.45){
      const def=rf(defenders.length?defenders:all);
      events.push({type:"def",text:`${min}' 🛡️ ${def.name.split(" ")[1]} ${rf(DEF_ACTIONS)}`});
    }else{
      const att=rf(weightedAttackers.length?weightedAttackers:all);
      events.push({type:"miss",text:`${min}' 😬 ${att.name.split(" ")[1]} ${rf(MISS_ACTIONS)}`});
    }
  }
  let motm=null,motmScore=-1;
  for(const [id,ev] of Object.entries(pEv)){const sc=ev.g*3+ev.a;if(sc>motmScore){motmScore=sc;motm=id;}}
  if(!motm&&myTeam.length)motm=rf(myTeam).id;
  const result=myG>oppG?"win":myG===oppG?"draw":"loss";
  const ptGain=result==="win"?50:result==="draw"?20:5;
  return{myGoals:myG,oppGoals:oppG,result,ptGain,events,playerEvents:pEv,motm,oppName,formation,captain:captainCard?.name||null};
}
function applyMatch(matchData){
  const devs=[];
  const prevAch=state.team.map(c=>({id:c.id,ach:[...(c.achievements||[])]}));
  state.team.forEach(card=>{
    card.matches=(card.matches||0)+1;
    const ev=matchData.playerEvents[card.id]||{g:0,a:0};
    card.goals=(card.goals||0)+(ev.g||0);
    card.assists=(card.assists||0)+(ev.a||0);
    let xp=10+(ev.g||0)*15+(ev.a||0)*8+(matchData.result==="win"?10:0)+(card.id===matchData.motm?20:0);
    if(card.position==="GK"&&matchData.oppGoals===0)xp+=15;
    const changes=grantXP(card,xp);
    devs.push({card,changes,xp});
    if((ev.g||0)>=1)grantAch(card,"first_goal");
    if((ev.g||0)>=3)grantAch(card,"hat_trick");
    if(card.position==="GK"&&matchData.oppGoals===0)grantAch(card,"clean_sheet");
    if(card.id===matchData.motm)grantAch(card,"motm");
    if((card.matches||0)>=10)grantAch(card,"veteran");
  });
  const newAch=[];
  state.team.forEach(card=>{
    const prev=prevAch.find(p=>p.id===card.id);
    (card.achievements||[]).forEach(key=>{if(prev&&!prev.ach.includes(key))newAch.push({card,key});});
  });
  return{devs,newAch};
}

    :!state.league?`<div style="padding:16px 16px 0;">
      <div class="accent-card" style="text-align:center;">
        <div style="font-size:13px;color:var(--text2);margin-bottom:10px;">No league active — start one to play competitive football</div>

    </div>`
    :seasonDone?`<div style="padding:16px 16px 0;">
      <div class="glass-card" style="text-align:center;border-color:rgba(245,158,11,.2);">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">Season complete!</div>

    <!-- Friendly matches -->

      <div class="sec-label">Friendly — pick opponent</div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
        ${bots.map((b,i)=>{
          const diff=b.avg>myA+5?t('diff_tough'):b.avg<myA-5?t('diff_easier'):t('diff_even');
          const col=b.avg>myA+5?"#f87171":b.avg<myA-5?"var(--accent)":"var(--legend)";
          return `<div onclick="selectOppAndSetup(${i})" style="flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;cursor:pointer;min-width:100px;text-align:center;">

    ${allResults.length?`<div style="padding:16px 16px 0;">
      <div class="sec-label">All results (${allResults.length})</div>
      <div class="glass-card" style="padding:8px 12px;">
        ${allResults.map(m=>{
          const col=m.result==="win"?"var(--accent)":m.result==="draw"?"var(--legend)":"#f87171";
          const res=m.result==="win"?"W":m.result==="draw"?"D":"L";
          const tag=m.isLeague?`<span style="font-size:8px;background:rgba(124,58,237,.2);color:#a78bfa;padding:1px 5px;border-radius:4px;margin-left:4px;">LEAGUE</span>`:"";
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);">

// ── Step 2: pre-match setup (formation, lineup, tactic, kick off)
function renderPreMatch(){
  const isLeague=state.matchSetup?.isLeague;
  if(!isLeague&&(!window._bots||state.chosenOpp==null)) return renderMatch();

  // Build opponent display info
  let opp;
  if(isLeague){
    const nextLeague=getNextPlayerFixture();
    const oppName=nextLeague?(nextLeague.homeIsPlayer?nextLeague.away:nextLeague.home):"Opponent";
    const oppEntry=state.league?.teams?.find(t=>t.name===oppName);
    opp={name:oppName,avg:oppEntry?.avg||teamAvg(genBotTeam()),isLeague:true};
  } else {
    opp=window._bots[state.chosenOpp];
  }
  const myA=teamAvg(state.team);

  const FORMATIONS=["4-3-3","4-4-2","4-5-1","3-5-2"];
  const FORM_BONUS={"4-3-3":"⚡ Attack +5","4-4-2":"⚖️ Balanced","4-5-1":"🛡️ Defence +5","3-5-2":"🎯 Midfield +5"};
  const TACTICS=[
    {id:"motivate", label:"Motivate", icon:"🔥", desc:"Morale boost · physical +3"},
    {id:"calm",     label:"Play calm", icon:"🧊", desc:"No bonus, no risk"},
    {id:"press",    label:"High press", icon:"⚡", desc:"Attack +5 · fatigue risk"},
  ];
  if(!state.matchSetup) state.matchSetup={formation:FORMATIONS[0],captain:state.team[0]?.id||null,swapMode:null,tactic:"calm"};
  const setup=state.matchSetup;
  const swapId=setup.swapMode;

  const FORM_ROWS={
    "4-3-3":[["ST","LW","RW"],["CM","CM","CM"],["CB","CB","LB","RB"],["GK"]],
    "4-4-2":[["ST","ST"],["LW","CM","CM","RW"],["CB","CB","LB","RB"],["GK"]],
    "4-5-1":[["ST"],["LW","CM","CAM","CM","RW"],["CB","CB","LB","RB"],["GK"]],
    "3-5-2":[["ST","ST"],["LW","CM","CAM","CM","RW"],["CB","CB","CB"],["GK"]],
  };

  const bench=[...state.collection].filter(c=>!state.team.some(t=>t.id===c.id)).sort((a,b)=>b.overall-a.overall);

  const pitchMarkings=`<div style="position:absolute;inset:0;pointer-events:none;">
    <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07);transform:translateX(-50%);"></div>
    <div style="position:absolute;left:50%;top:50%;width:70px;height:70px;border-radius:50%;border:1px solid rgba(255,255,255,.07);transform:translate(-50%,-50%);"></div>
    <div style="position:absolute;left:20%;right:20%;bottom:0;height:44px;border:1px solid rgba(255,255,255,.07);border-bottom:none;"></div>
  </div>`;

  const teamSlots=state.team.slice(0,11);
  let slotIdx=0;
  const rows=FORM_ROWS[setup.formation]||FORM_ROWS["4-3-3"];
  const pitchRows=rows.map(row=>{
    const rowPlayers=row.map(()=>teamSlots[slotIdx++]||null);
    return `<div style="display:flex;justify-content:center;gap:8px;margin-bottom:10px;">
      ${rowPlayers.map(pl=>{
        if(!pl) return `<div style="width:44px;height:44px;border-radius:12px;border:1.5px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.15);font-size:14px;">+</div>`;
        const isCap=pl.id===setup.captain;
        const isSwap=pl.id===swapId;
        const isInjured=(pl.injuredFor||0)>0;
        const border=isSwap?"2px solid #f59e0b":isInjured?"1.5px solid #f87171":`1.5px solid ${pl.theme.border}`;
        const glow=isSwap?"0 0 12px rgba(245,158,11,.6)":isInjured?"0 0 8px rgba(248,113,113,.4)":`0 0 8px ${pl.theme.glow}`;
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;min-width:44px;" onclick="matchTapPlayer('${pl.id}')">
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(0,0,0,.5);border:${border};display:flex;align-items:center;justify-content:center;box-shadow:${glow};position:relative;">
            ${avSVG(pl,30)}
            ${isCap?`<div style="position:absolute;top:-5px;right:-5px;background:#f59e0b;color:#000;font-size:8px;font-weight:900;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;">C</div>`:""}
            <div style="position:absolute;bottom:-3px;right:-3px;">${statusPip(pl)}</div>
          </div>
          <div style="font-size:8px;color:rgba(255,255,255,.5);font-weight:600;max-width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${pl.name.split(" ")[1]}</div>
          <div style="font-size:9px;font-family:var(--font-display);color:${pl.theme.accent};">${pl.overall}</div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");

  const oppCol=opp.avg>myA+5?"#f87171":opp.avg<myA-5?"var(--accent)":"var(--legend)";

  return `<div class="screen fade-up">

    <!-- Match header: you vs them -->
    <div style="padding:16px 16px 0;">
      <div style="background:linear-gradient(135deg,rgba(0,0,0,.5),rgba(10,20,40,.5));border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;display:flex;align-items:center;justify-content:space-between;">
        <div style="text-align:center;flex:1;">
          <div style="font-size:11px;color:var(--text4);margin-bottom:2px;">Your team</div>
          <div style="font-size:24px;font-family:var(--font-display);color:var(--accent);">${myA}</div>
        </div>
        <div style="font-size:18px;color:var(--text4);padding:0 8px;">vs</div>
        <div style="text-align:center;flex:1;">
          <div style="font-size:11px;color:var(--text4);margin-bottom:2px;">${opp.name}</div>
          <div style="font-size:24px;font-family:var(--font-display);color:${oppCol};">${opp.avg}</div>
        </div>
        <button onclick="${isLeague?"navTo('match')":"navTo('friendlysetup')"}" style="font-size:11px;color:var(--text4);background:none;border:none;cursor:pointer;padding:4px 8px;">← Back</button>
      </div>
      ${isLeague?`<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:4px 10px;margin-top:8px;"><span style="font-size:10px;color:#a78bfa;font-weight:700;letter-spacing:.06em;">🏆 LEAGUE FIXTURE</span></div>`:`<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,245,147,.08);border:1px solid rgba(0,245,147,.2);border-radius:8px;padding:4px 10px;margin-top:8px;"><span style="font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.06em;">🤝 FRIENDLY</span></div>`}
    </div>
    </div>

    <!-- Formation -->
    <div style="padding:14px 16px 0;">
      <div class="sec-label">Formation</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${FORMATIONS.map(f=>{
          const active=setup.formation===f;
          return `<button onclick="setFormation('${f}')" class="btn-ghost sm ${active?"accent":""}" style="${active?"border-color:var(--accent);":""}">${f} <span style="font-size:9px;color:${active?"rgba(255,255,255,.5)":"var(--text4)"};">${FORM_BONUS[f]}</span></button>`;
        }).join("")}
      </div>
    </div>

    <!-- Lineup pitch -->
    <div style="padding:10px 16px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div class="sec-label" style="margin:0;">${swapId?"⚡ Tap another player to swap":"Lineup — tap to captain or swap"}</div>

function renderMatchReport(){
  const m=state.match; if(!m)return renderHome();
  const col=m.result==="win"?"var(--accent)":m.result==="draw"?"var(--legend)":"#f87171";
  const icon=m.result==="win"?"🏆":m.result==="draw"?"🤝":"💔";

  // ── Player ratings (1–10 based on performance)
  const ratings=state.team.map(card=>{
    const ev=m.playerEvents[card.id]||{g:0,a:0};
    let r=5.5;
    r+=ev.g*1.2; r+=ev.a*0.7;
    if(card.id===m.motm) r+=1.5;
    if(card.position==="GK"&&m.oppGoals===0) r+=1.8;
    if(m.result==="win") r+=0.4;
    if((card.fatigue||0)>=60) r-=0.6;
    if((card.injuredFor||0)>0) r-=2;
    r=Math.max(3,Math.min(10,Math.round(r*10)/10));
    const cls=r>=8?"rating-a":r>=6.5?"rating-b":r>=5?"rating-c":"rating-d";
    return{card,r,ev,cls};
  }).sort((a,b)=>b.r-a.r);

  const ratingsHTML=`<div style="padding:0 16px;">
    <div class="sec-label">Player Ratings</div>
    <div class="glass-card" style="padding:8px 12px;">
      ${ratings.map(({card,r,ev,cls})=>`<div class="rating-row">
        <div class="rating-num ${cls}">${r.toFixed(1)}</div>
        <div style="flex-shrink:0;">${avSVG(card,32)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;">
            ${card.name.split(" ")[1]}
            ${statusPip(card)}
            ${card.id===m.motm?`<span style="font-size:9px;background:rgba(245,158,11,.15);color:var(--legend);padding:1px 5px;border-radius:4px;">MOTM</span>`:""}
          </div>
          <div style="font-size:10px;color:var(--text4);">${card.position}${ev.g?` · ${ev.g}⚽`:""}${ev.a?` · ${ev.a}▶`:""}</div>
        </div>
        <div style="font-size:10px;color:var(--text3);">${statusLabel(card)}</div>
      </div>`).join("")}
    </div>
  </div>`;

  // ── Events timeline
  const timelineHTML=`<div style="padding:0 16px;">
    <div class="sec-label">Match Timeline</div>
    <div class="glass-card" style="padding:14px 16px;">
      <div class="timeline-wrap">
        ${m.events.map(e=>{
          const dotCls=e.type==="goal_my"?"tl-goal-my":e.type==="goal_opp"?"tl-goal-opp":e.type==="def"?"tl-def":"tl-miss";
          const textCol=e.type==="goal_my"?"var(--accent)":e.type==="goal_opp"?"#f87171":e.type==="def"?"#60a5fa":"var(--text4)";
          return `<div class="timeline-event">
            <div class="timeline-dot ${dotCls}"></div>
            <div style="font-size:12px;color:${textCol};line-height:1.4;">${e.text}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;

  // ── Fatigue report
  const fatigued=state.team.filter(c=>(c.fatigue||0)>=60||(c.injuredFor||0)>0);
  const fatigueHTML=fatigued.length?`<div style="padding:0 16px;">
    <div class="sec-label">⚠️ Squad Fitness Report</div>
    <div class="glass-card" style="border-color:rgba(245,158,11,.2);padding:10px 12px;">
      ${fatigued.map(c=>{
        const fatPct=Math.min(100,c.fatigue||0);
        const barCol=(c.injuredFor||0)>0?"#f87171":(c.fatigue||0)>=80?"#f87171":"#f59e0b";
        return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);">
          ${avSVG(c,30)}
          <div style="flex:1;">
            <div style="font-size:12px;font-weight:600;">${c.name.split(" ")[1]} <span style="font-size:9px;color:var(--text4);">${c.position}</span></div>
            ${(c.injuredFor||0)>0
              ?`<div style="font-size:10px;color:#f87171;">🔴 Injured — out for ${c.injuredFor} round${c.injuredFor>1?"s":""}</div>`
              :`<div class="fatigue-bar-bg"><div class="fatigue-bar-fill" style="width:${fatPct}%;background:${barCol};"></div></div>
               <div style="font-size:9px;color:var(--text4);margin-top:1px;">Fatigue ${fatPct}% — play trivia to recover</div>`}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`:"";

  const devs=(m.devData?.devs||[]).filter(d=>d.changes.length>0);
  const devHTML=devs.length?`<div style="padding:0 16px;">
    <div class="sec-label">${t('player_dev')}</div>
    ${devs.map(d=>`<div style="background:var(--surface);border:1px solid rgba(0,245,147,.15);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;">
      ${avSVG(d.card,38)}
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">${d.card.name}</div>
        ${d.changes.map(c=>`<div style="color:var(--accent);font-size:11px;">▲ ${c.stat} +${c.gain}${c.ovrGain>0?" · OVR +"+c.ovrGain:""}</div>`).join("")}
        <div style="color:var(--accent2);font-size:10px;margin-top:1px;">+${d.xp} XP · LVL ${d.card.level}</div>
      </div>
    </div>`).join("")}
  </div>`:"";

  const newAch=m.devData?.newAch||[];
  const achHTML=newAch.length?`<div style="padding:0 16px;">
    <div class="sec-label">${t('new_achievement')}</div>
    ${newAch.map(({card,key})=>`<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:20px;">${ACHIEVEMENTS[key].icon}</span>
      <div><div style="color:var(--legend);font-weight:700;font-size:12px;">${ACHIEVEMENTS[key].label}</div>
      <div style="color:var(--text3);font-size:10px;">${card.name} — ${ACHIEVEMENTS[key].desc}</div></div>
    </div>`).join("")}
  </div>`:"";

  const motmCard=m.motm?state.team.find(c=>c.id==m.motm):null;
  return `<div class="screen fade-up">
    <!-- Score -->
    <div style="padding:16px 16px 0;">
      <div style="background:linear-gradient(135deg,rgba(0,0,0,.4),rgba(10,46,20,.4));border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,.01) 28px,rgba(255,255,255,.01) 29px);pointer-events:none;"></div>
        <div style="font-size:11px;color:var(--text4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">Full Time</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div style="font-size:12px;font-weight:600;color:var(--text2);">⭐ Your Team</div>
          <div style="font-size:60px;font-family:var(--font-display);letter-spacing:8px;color:${col};">${m.myGoals}–${m.oppGoals}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text2);">${m.oppName}</div>
        </div>
        <div style="display:inline-block;background:${col}18;border:1px solid ${col}44;color:${col};padding:5px 18px;border-radius:8px;font-weight:700;font-size:14px;letter-spacing:2px;">${icon} ${m.result.toUpperCase()} · +${m.ptGain} pts</div>
      </div>
    </div>
    ${motmCard?`<div style="padding:20px 16px 0;">
      <div class="sec-label">${t('man_of_match')}</div>
      <div style="display:flex;justify-content:center;">${fullCard(motmCard,true)}</div>
    </div>`:""}
    <div style="padding:20px 16px 0;">${ratingsHTML.replace('<div style="padding:0 16px;">','<div>').replace('</div>','</div>',1)}</div>
    <div style="padding:0 16px 0;">${timelineHTML.replace('<div style="padding:0 16px;">','<div>').replace('</div>','</div>',1)}</div>
    ${devHTML}${achHTML}
    <div style="padding:0 16px 0;">${fatigueHTML.replace('<div style="padding:0 16px;">','<div>').replace('</div>','</div>',1)}</div>
    <div style="padding:20px 16px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="btn-ghost accent" onclick="navTo('match')">${t('btn_rematch')}</button>
      <button class="btn-ghost gold" onclick="navTo('market')">💰 Market</button>
      <button class="btn-ghost" onclick="navTo('home')">${t('btn_home')}</button>
    </div>
  </div>`;
}

  const lg=state.league;
  const myI=lg.standings.findIndex(s=>s.isPlayer),myPos=myI+1;
  const medal=p=>p===1?"🥇":p===2?"🥈":p===3?"🥉":`${p}.`;
  const bonus=myPos===1?150:myPos===2?80:myPos===3?40:0;
  return `<div class="screen fade-up">
    <!-- My position hero -->
    <div class="hero-card">
      <div class="hero-eyebrow">${t('league_week',{n:lg.week})}</div>
      <div class="hero-pts">${medal(myPos)} #${myPos}</div>
      <div class="hero-sub">${myPos===1?"🔥 Leading the league!":myPos===2?"💪 Almost at the top!":myPos===3?"⭐ On the podium!":myPos-3+" places from a bonus!"}</div>
      ${bonus?`<div class="hero-chips"><div class="hero-chip"><div class="hero-chip-lbl">Weekly Bonus</div><div class="hero-chip-val">+${bonus} pts</div></div></div>`:""}
    </div>
    <!-- Standings table -->
    <div style="padding:20px 16px 0;">
      <!-- Header -->
      <div style="display:flex;gap:8px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px;">
        <div style="width:28px;font-size:10px;color:var(--text5);text-align:center;">#</div>
        <div style="flex:1;font-size:10px;color:var(--text5);">${t('col_team')}</div>
        <div style="width:36px;font-size:10px;color:var(--text5);text-align:center;">${t('col_avg')}</div>
        <div style="width:36px;font-size:10px;color:var(--text5);text-align:center;font-weight:700;">${t('col_pts')}</div>
      </div>
      ${lg.standings.map((s,i)=>`
        <div class="league-row ${i<4?"top":""}" style="${s.isPlayer?"background:linear-gradient(90deg,rgba(0,245,147,.05),transparent);":""}">
          ${i<4?"":`<div style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;border-radius:2px;background:${s.isPlayer?"var(--accent)":"transparent"};"></div>`}
          <div style="width:28px;text-align:center;">
            <span style="font-size:13px;font-family:var(--font-display);color:${i<4?"var(--accent)":"var(--text4)"};">${s.pos||i+1}</span>
          </div>
          <div style="flex:1;font-size:13px;font-weight:${s.isPlayer?700:400};color:${s.isPlayer?"var(--accent)":i<4?"var(--text2)":"var(--text3)"};">${s.name}</div>
          <div style="width:36px;text-align:center;font-size:11px;color:var(--text4);">${Math.round(s.avg)}</div>
          <div style="width:36px;text-align:center;">
            <span style="font-size:15px;font-family:var(--font-display);color:${s.isPlayer?"var(--accent)":i<4?"var(--text)":"var(--text3)"};">${s.pts}</span>
          </div>
        </div>`).join("")}
      <!-- UCL badge -->
      <div style="display:flex;align-items:center;gap:6px;margin-top:12px;">
        <div style="width:3px;height:12px;border-radius:2px;background:var(--accent);"></div>
        <span style="font-size:10px;color:var(--text4);">${t('top3_bonus')}</span>
      </div>
    </div>
    <div style="padding:20px 16px 0;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-primary" style="flex:2;" onclick="simulateWeek()">${t('btn_simulate',{n:lg.week+1})}</button>
      <button class="btn-ghost" style="flex:1;" onclick="startRound()">⚽ Trivia</button>
    </div>
  </div>`;
}

// RENDER — LIVE MATCH (Comic Panels)

function renderLiveMatch(){
  const lm=state.liveMatchState; if(!lm)return renderHome();
  const shown=lm.events.slice(0,lm.shown);
  const [myG,oppG]=lm.score;
  const scoreCol=myG>oppG?"#00f593":myG<oppG?"#f87171":"#f59e0b";
  const progress=lm.events.length>0?Math.round((lm.shown/lm.events.length)*90):0;
  const isLive=lm.shown<lm.events.length;

  // Build event rows — newest first
  const eventRows=[...shown].reverse().map((ev,idx)=>{
    const isMyGoal=ev.type==="goal_my";
    const isOppGoal=ev.type==="goal_opp";
    const isDef=ev.type==="def";
    const cls=isMyGoal?"goal":isOppGoal?"goal-opp":isDef?"def":"";
    const icon=isMyGoal?"⚽":isOppGoal?"⚽":isDef?"🛡️":"💨";
    const color=isMyGoal?"#00f593":isOppGoal?"#f87171":isDef?"#60a5fa":"var(--text4)";
    const txt=ev.text.replace(/^\d+'[ ]/,"");
    const min=ev.text.match(/^(\d+)'/)?.[1]||"";
    return `<div class="live-event-card ${cls}" style="animation-delay:${idx*0.06}s;">
      <div class="live-event-icon">${icon}</div>
      <div style="flex:1;min-width:0;">
        <div class="live-event-text">${txt}</div>
      </div>
      ${min?`<div class="live-event-min" style="color:${color};">${min}'</div>`:""}
    </div>`;
  }).join("");

  return `<div class="screen fade-up">
    <!-- Score bar -->
    <div class="live-score-bar">
      <div style="text-align:center;flex:1;">
        <div style="font-size:10px;color:var(--text4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;">⭐ Your Team</div>
        <div style="font-size:42px;font-family:var(--font-display);color:${myG>=oppG?scoreCol:"var(--text2)"};">${myG}</div>
      </div>
      <div style="text-align:center;padding:0 16px;">
        <div style="font-size:11px;color:${scoreCol};font-weight:700;letter-spacing:.1em;">${isLive?"LIVE":"FT"}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:4px;">${progress}'</div>
      </div>
      <div style="text-align:center;flex:1;">
        <div style="font-size:10px;color:var(--text4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;">${lm.oppName}</div>
        <div style="font-size:42px;font-family:var(--font-display);color:${oppG>=myG&&oppG>0?scoreCol:"var(--text2)"};">${oppG}</div>
      </div>
    </div>
    <!-- Progress bar -->
    <div style="padding:0 16px 14px;">
      <div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;">
        <div style="width:${progress}%;height:100%;background:var(--gradient);border-radius:2px;transition:width 1.5s;"></div>
      </div>
    </div>
    <!-- Event feed -->
    <div class="live-feed">
      ${shown.length===0?`<div style="text-align:center;padding:40px 0;color:var(--text4);font-size:13px;">Kick-off…</div>`:eventRows}
      ${!isLive?"":`<div style="text-align:center;padding:12px 0;color:var(--text4);font-size:12px;">Match in progress…</div>`}
    </div>
  </div>`;
}

function renderMarket(){
  if(!state.market||state.market.length===0) refreshMarket();
  const market=state.market||[];
  const sellable=state.collection.filter(c=>!state.team.some(t=>t.id===c.id));

  return `<div class="screen fade-up">
    <div style="padding:16px 16px 0;">
      <div class="accent-card" style="margin-bottom:16px;">
        <div style="font-size:11px;color:var(--text3);margin-bottom:2px;">Your balance</div>
        <div style="font-size:28px;font-family:var(--font-display);color:var(--legend);">${state.points} pts</div>
        <div style="font-size:10px;color:var(--text4);margin-top:4px;">Earn more via trivia · Sell cards to raise funds</div>
      </div>

      <div class="sec-label">Transfer Market — Available</div>
      ${market.length===0?`<div style="color:var(--text4);text-align:center;padding:20px 0;">Market refreshes after next trivia round ⚽</div>`
      :market.map((c,i)=>{
        const price=cardMarketValue(c);
        const canAfford=state.points>=price;
        const t2=c.theme;
        return `<div class="market-card ${c.difficulty==="hard"?"featured":""}">
          <div style="flex-shrink:0;">${avSVG(c,44)}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-weight:700;font-size:13px;">${c.name}</span>
              <span style="background:${t2.accent}18;color:${t2.accent};font-size:9px;padding:2px 6px;border-radius:5px;font-weight:600;">${t2.label}</span>
            </div>
            <div style="font-size:11px;color:var(--text3);">${c.position} · OVR ${c.overall}</div>
            <div class="market-price">${price} pts</div>
          </div>
          <button class="btn-ghost sm ${canAfford?"accent":"dim"}" onclick="buyCard(${i})" ${canAfford?"":"disabled"}>Buy</button>
        </div>`;
      }).join("")}

      <div class="sec-label" style="margin-top:20px;">Your Cards — List for Sale</div>
      ${sellable.length===0?`<div style="color:var(--text4);font-size:12px;padding:10px 0;">No cards available to sell (cards in your team can't be listed)</div>`
      :sellable.map(c=>{
        const sell=cardSellPrice(c);
        const s=getStatus(c);
        return `<div class="market-card">
          <div style="flex-shrink:0;position:relative;">${avSVG(c,44)}${statusPip(c)}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;">${c.name}</div>
            <div style="font-size:11px;color:var(--text3);">${c.position} · OVR ${c.overall} · ${statusLabel(c)}</div>
            <div class="market-sell-price">Sell for <span style="color:var(--legend);font-weight:700;">${sell} pts</span></div>
          </div>
          <button class="btn-ghost sm gold" onclick="listCard('${c.id}')">Sell</button>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

// RENDER ENGINE
// ══════════════════════════════════════════════════════════
function render(preserveScroll){
  saveState();
  const app=document.getElementById("app");
  const sw=document.getElementById("screen-wrap");
  const prevScroll=preserveScroll?sw.scrollTop:0;
  const screens={home:renderHome,trivia:renderTrivia,reward:renderReward,collection:renderCollection,team:renderTeam,league:renderLeague,match:renderMatch,friendlysetup:renderFriendlySetup,prematch:renderPreMatch,matchreport:renderMatchReport,livematch:renderLiveMatch,market:renderMarket};
  app.innerHTML=(screens[state.screen]||renderHome)();
  if(preserveScroll){sw.scrollTop=prevScroll;}else{sw.scrollTop=0;}
  updateHeader(state.screen);
}

function navTo(screen){

}

function claimDaily(){
  if(state.dailyClaimed)return;
  state.points+=100; state.dailyClaimed=true;

async function startRound(){
  // Resolve "auto" league on first use
  if(state.triviaLeague==="auto"){
    const local=detectLocalLeague();
    state.triviaLeague=local?local.id:"all";
    localStorage.setItem("fc_league",state.triviaLeague);
  }
  state.triviaLoading=true; state.screen="trivia"; render();
  let qs;
  try{
    qs=await fetchTriviaQuestions(state.triviaLeague);
  }catch(e){
    notify("AI trivia unavailable, using classic questions","var(--legend)");
      console.warn("AI trivia error:",e);
    qs=["easy","medium","hard"].map(diff=>{const q=rf(QUESTIONS[diff]);return{...q,opts:[...q.opts].sort(()=>Math.random()-.5),diff};});
  }
  state.triviaLoading=false;
  state.round={questions:qs,current:0,correct:0,answers:[],lifelines:{fifty:true,phone:true,audience:true}};
  state.answered=false; state.chosen=null; state.hidden5050=[]; state.audiencePoll=null;
  state.screen="trivia"; render();
}

function answerQ(answer){
  if(state.answered)return;
  const r=state.round,q=r.questions[r.current];
  const correct=answer===q.a;
  state.answered=true; state.chosen=answer;
  if(correct){
    state.points+=DIFF_PTS[q.diff];
    sndCorrect();
    notify(rf(COMMENTATOR_CORRECT),"var(--accent)");
  } else {
    sndWrong();
  }
  r.answers.push({q,answer,correct});
  if(correct)r.correct++;
  render(true);
}

function nextQ(){
  const r=state.round;
  if(r.current>=2){
    state.lastCards=r.answers.filter(a=>a.correct).map(a=>genCard(a.q.diff));
    state.collection.push(...state.lastCards);
    // Recover fatigue after studying (trivia round)
    recoverFatigue();
    // Refresh market after each round
    refreshMarket();
    state.screen="reward";
  }else{
    r.current++; state.answered=false; state.chosen=null; state.hidden5050=[]; state.audiencePoll=null; state.screen="trivia";
  }
  render();
}

function use5050(){
  const r=state.round;
  if(!r.lifelines.fifty||state.points<30||state.answered)return;
  state.points-=30; r.lifelines.fifty=false;
  const q=r.questions[r.current];
  state.hidden5050=q.opts.filter(o=>o!==q.a).sort(()=>Math.random()-.5).slice(0,2);
  notify(t("notif_fifty"),"var(--accent2)"); render(true);
}
function usePhone(){
  const r=state.round;
  if(!r.lifelines.phone||state.points<30||state.answered)return;
  state.points-=30; r.lifelines.phone=false;
  const q=r.questions[r.current];
  const hint=Math.random()<0.8?q.a:rf(q.opts.filter(o=>o!==q.a));
  notify(t("notif_phone_says",{hint}),"#60a5fa"); render(true);
}
function useAudience(){
  const r=state.round;
  if(!r.lifelines.audience||state.points<30||state.answered)return;
  state.points-=30; r.lifelines.audience=false;
  const q=r.questions[r.current];
  const cp=ri(55,80); let rem=100-cp;
  const poll={[q.a]:cp};
  q.opts.filter(o=>o!==q.a).forEach((o,i,arr)=>{const p=i===arr.length-1?rem:ri(0,rem);poll[o]=p;rem-=p;});
  state.audiencePoll=poll;
  notify(t("notif_audience"),"var(--accent2)"); render(true);
}

function removeFromTeam(cardId){
  state.team=state.team.filter(c=>c.id!=cardId);
  notify("Removed from team","var(--text3)");
  render(true);
}

function addToTeam(cardId){
  const card=state.collection.find(c=>c.id==cardId);
  if(!card)return;
  if(state.team.some(c=>c.id===card.id)){notify(t("notif_already_team"),"var(--legend)");return;}
  if(state.team.length>=11){
    const weakest=[...state.team].sort((a,b)=>a.overall-b.overall)[0];
    if(card.overall>weakest.overall){state.team=state.team.filter(c=>c.id!==weakest.id);state.team.push(card);notify(t("notif_replaced",{name:weakest.name.split(" ")[1]}),"var(--accent)");}
    else{notify(t("notif_too_weak"),"var(--legend)");return;}
  }else{state.team.push(card);notify(t("notif_added",{name:card.name}),"var(--accent)");}
  render(true);
}

// LEAGUE ENGINE — fixture-based, standard points table
// ══════════════════════════════════════════════════════════

const TOTAL_WEEKS=10; // season length

function startLeague(){
  if(state.team.length<3){notify(t("notif_need3"),"var(--legend)");return;}
  const myAvg=teamAvg(state.team);
  const botEntries=BOT_NAMES.map(name=>({name,avg:teamAvg(genBotTeam()),isPlayer:false,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  const playerEntry={name:"⭐ Your Team",avg:myAvg,isPlayer:true,w:0,d:0,l:0,gf:0,ga:0,pts:0};
  const teams=[playerEntry,...botEntries];

  // Generate round-robin fixtures — each team plays each other once
  const fixtures=[];
  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){
      fixtures.push({home:teams[i].name,away:teams[j].name,homeIsPlayer:teams[i].isPlayer,awayIsPlayer:teams[j].isPlayer,played:false,result:null,hg:0,ag:0});
    }
  }
  // Distribute fixtures across weeks (spread evenly)
  const perWeek=Math.ceil(fixtures.length/TOTAL_WEEKS);
  fixtures.forEach((f,i)=>{f.week=Math.floor(i/perWeek)+1;});

  state.league={teams,fixtures,week:1,season:1};
  state.screen="league";
  render();
}

function getLeagueTable(){
  const lg=state.league;
  return [...lg.teams].map(t2=>{
    // Count from played fixtures
    const w=lg.fixtures.filter(f=>f.played&&((f.homeIsPlayer&&t2.isPlayer||f.home===t2.name)&&f.hg>f.ag||(f.awayIsPlayer&&t2.isPlayer||f.away===t2.name)&&f.ag>f.hg)).length;
    // Recalculate from scratch off fixtures for accuracy
    let wins=0,draws=0,losses=0,gf=0,ga=0;
    lg.fixtures.filter(f=>f.played).forEach(f=>{
      const isHome=f.homeIsPlayer?t2.isPlayer:f.home===t2.name;
      const isAway=f.awayIsPlayer?t2.isPlayer:f.away===t2.name;
      if(!isHome&&!isAway)return;
      const myG=isHome?f.hg:f.ag;
      const opG=isHome?f.ag:f.hg;
      gf+=myG;ga+=opG;
      if(myG>opG)wins++;
      else if(myG===opG)draws++;
      else losses++;
    });
    return{...t2,w:wins,d:draws,l:losses,gf,ga,gd:gf-ga,pts:wins*3+draws,played:wins+draws+losses};
  }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function getNextPlayerFixture(){
  const lg=state.league;
  if(!lg)return null;
  return lg.fixtures.find(f=>!f.played&&(f.homeIsPlayer||f.awayIsPlayer));
}

function simulateLeagueWeek(){
  const lg=state.league;
  const weekFixtures=lg.fixtures.filter(f=>!f.played&&f.week===lg.week);
  weekFixtures.forEach(f=>{
    if(f.homeIsPlayer||f.awayIsPlayer) return; // player match handled separately
    // Bot vs bot simulation
    const homeAvg=lg.teams.find(t=>t.name===f.home)?.avg||65;
    const awayAvg=lg.teams.find(t=>t.name===f.away)?.avg||65;
    const hScore=ri(0,Math.round(homeAvg/25));
    const aScore=ri(0,Math.round(awayAvg/25));
    f.hg=hScore;f.ag=aScore;f.played=true;
    f.result=hScore>aScore?"home":hScore===aScore?"draw":"away";
  });
}

function playLeagueMatch(tacBonus=0){
  const lg=state.league;
  const fix=getNextPlayerFixture();
  if(!fix)return;
  const isHome=fix.homeIsPlayer;
  const oppName=isHome?fix.away:fix.home;
  const oppTeam=lg.teams.find(t=>t.name===oppName);
  const oppAvg=oppTeam?.avg||65;
  // Simulate using existing engine
  const myTeam=state.team;
  const matchData=simulateMatch(myTeam,genBotTeam(),oppName,tacBonus);
  // Write result into fixture
  fix.played=true;
  fix.hg=isHome?matchData.myGoals:matchData.oppGoals;
  fix.ag=isHome?matchData.oppGoals:matchData.myGoals;
  fix.result=matchData.result;
  // Apply XP/development
  const devData=applyMatch(matchData);
  matchData.devData=devData;
  state.points+=matchData.ptGain;
  state.match=matchData;
  state.matchHistory.push({result:matchData.result,myGoals:matchData.myGoals,oppGoals:matchData.oppGoals,oppName,ptGain:matchData.ptGain,isLeague:true,week:lg.week});
  // Advance week if all this week's fixtures are played
  const remaining=lg.fixtures.filter(f=>!f.played&&f.week===lg.week);
  if(remaining.length===0||(remaining.length===1&&(remaining[0].homeIsPlayer||remaining[0].awayIsPlayer))){
    simulateLeagueWeek();
    lg.week=Math.min(lg.week+1,TOTAL_WEEKS+1);
  }
  applyFatigueToTeam();
  if(matchData.motm) markInForm(matchData.motm);
  const tactic=state.matchSetup?.tactic||"calm";
  const tacFatigueExtra={motivate:0,calm:0,press:8}[tactic]||0;
  if(tacFatigueExtra>0) state.team.forEach(c=>{c.fatigue=Math.min(100,(c.fatigue||0)+tacFatigueExtra);});
  state.liveMatchState={events:matchData.events,shown:0,score:[0,0],oppName,finalData:matchData};
  // Post result to friend league if active
  if(state.friendLeague){
    const fFix=getNextFriendFixture();
    if(fFix){
      const meIsHome=fFix.home===state.friendLeague.myName;
      friendLeaguePostResult(
        fFix.home,fFix.away,
        meIsHome?matchData.myGoals:matchData.oppGoals,
        meIsHome?matchData.oppGoals:matchData.myGoals
      );
    }
  }
  state.screen="livematch";
  render();
  sndKickoff();
  driveLiveMatch();
}

  if(!state.matchSetup) state.matchSetup={formation:"4-3-3",captain:null,swapMode:null};

  if(setup.swapMode){
    // Second tap on a starter — swap positions in team array
    const idxA=state.team.findIndex(c=>c.id==setup.swapMode);
    const idxB=state.team.findIndex(c=>c.id==id);
    if(idxA!==-1&&idxB!==-1&&idxA!==idxB){
      [state.team[idxA],state.team[idxB]]=[state.team[idxB],state.team[idxA]];
      notify("Players swapped ✅","var(--accent)");
    }
    setup.swapMode=null;
  } else if(setup.captain===id){
    // Tapping captain again enters swap mode
    setup.swapMode=id;
  } else {
    // First tap = set captain
    setup.captain=id;
  }
  render(true);
}

function swapIn(benchId){
  if(!state.matchSetup?.swapMode) return;
  const swapOut=state.matchSetup.swapMode;
  const outIdx=state.team.findIndex(c=>c.id==swapOut);
  const benchCard=state.collection.find(c=>c.id==benchId);
  if(outIdx===-1||!benchCard) return;
  // Move outgoing to collection only (they stay in collection always), bring bench card into team slot
  state.team[outIdx]=benchCard;
  state.matchSetup.swapMode=null;
  notify(`${benchCard.name.split(" ")[1]} starts! ✅`,"var(--accent)");
  render(true);
}

  if(state.chosenOpp==null||!window._bots)return;
  const opp=window._bots[state.chosenOpp];
  const oppTeam=genBotTeam();
  const tacFatigueExtra={motivate:0,calm:0,press:8}[tactic]||0;
  const matchData=simulateMatch(state.team,oppTeam,opp.name,tacBonus);
  const devData=applyMatch(matchData);
  matchData.devData=devData;
  matchData.tactic=tactic;
  state.points+=matchData.ptGain;
  state.match=matchData;
  state.matchHistory.push({result:matchData.result,myGoals:matchData.myGoals,oppGoals:matchData.oppGoals,oppName:matchData.oppName,ptGain:matchData.ptGain});
  state.chosenOpp=null;
  applyFatigueToTeam();
  if(tacFatigueExtra>0) state.team.forEach(c=>{c.fatigue=Math.min(100,(c.fatigue||0)+tacFatigueExtra);});
  if(matchData.motm) markInForm(matchData.motm);
  state.liveMatchState={events:matchData.events,shown:0,score:[0,0],oppName:matchData.oppName,finalData:matchData};
  state.screen="livematch";
  render();
  sndKickoff();
  driveLiveMatch();
}

let _liveTimer=null;
function driveLiveMatch(){
  clearInterval(_liveTimer);
  const lm=state.liveMatchState;
  if(!lm)return;
  _liveTimer=setInterval(()=>{
    if(!state.liveMatchState||state.screen!=="livematch"){clearInterval(_liveTimer);return;}
    const lm=state.liveMatchState;
    if(lm.shown>=lm.events.length){
      clearInterval(_liveTimer);
      // Short pause then go to report
      sndCrowd(0.07);
      setTimeout(()=>{
        if(lm.finalData.result==="win") notify(t("notif_win",{pts:lm.finalData.ptGain}),"var(--accent)");
        else if(lm.finalData.result==="draw") notify(t("notif_draw",{pts:lm.finalData.ptGain}),"var(--legend)");
        else notify(t("notif_loss",{pts:lm.finalData.ptGain}),"#f87171");
        setTimeout(()=>{state.screen="matchreport";render();},1800);
      },1200);
      return;
    }
    const ev=lm.events[lm.shown];
    if(ev.type==="goal_my"){lm.score[0]++;sndGoal();}
    else if(ev.type==="goal_opp"){lm.score[1]++;sndGoal();}
    else{sndCrowd(0.03);}
    lm.shown++;
    render(true);
  },1600);
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
render();
</script>
