<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#08080f"/>
<title>Footy Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#08080f;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.05);
  --text:#fff;
  --text2:#ddd;
  --text3:#888;
  --text4:#555;
  --text5:#444;

  /* accent = neon green variant (matches reference "green" variant) */
  --accent:#00f593;
  --accent2:#7c3aed;
  --accentGlow:rgba(0,245,147,0.3);
  --accent2Glow:rgba(124,58,237,0.35);
  --gradient:linear-gradient(135deg,#00f593 0%,#7c3aed 100%);
  --gradientCard:linear-gradient(135deg,rgba(0,245,147,0.12) 0%,rgba(124,58,237,0.08) 100%);

  /* card tier accents */
  --rookie:#00f593;
  --pro:#a78bfa;
  --legend:#f59e0b;

  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:calc(64px + var(--safe-bottom));
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;}
#root{height:100%;overflow:hidden;display:flex;flex-direction:column;}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit;}
button:active{transform:scale(0.96);}
svg{display:block;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* ── HEADER ── */
#header{
  flex-shrink:0;padding:12px 16px 10px;
  background:var(--bg);border-bottom:1px solid var(--border2);
}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.header-sub{font-size:11px;color:var(--text4);letter-spacing:0.08em;text-transform:uppercase;font-weight:600;}
.header-title{font-size:20px;font-family:var(--font-display);color:var(--text);letter-spacing:0.04em;line-height:1.1;}
.header-avatar{
  width:34px;height:34px;border-radius:10px;
  background:var(--gradient);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 0 12px var(--accentGlow);
  flex-shrink:0;
}

/* ── SCREENS ── */
#screen-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen{padding:0 0 calc(16px + var(--nav-h));}

/* ── BOTTOM NAV ── */
#nav{
  flex-shrink:0;
  background:rgba(8,8,15,0.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px 6px;background:none;border:none;cursor:pointer;
  color:var(--text5);transition:color .15s;
  font-family:var(--font-body);
}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{transition:filter .15s;}
.nav-btn.active svg{filter:drop-shadow(0 0 6px var(--accent));}
.nav-label{font-size:9px;font-weight:400;}
.nav-btn.active .nav-label{font-weight:700;}
.nav-dot{width:16px;height:2px;border-radius:1px;background:var(--accent);margin-top:1px;}

/* ── NOTIFICATION ── */
#notif{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-100px);
  background:#0e0e1a;border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  color:var(--accent);padding:10px 22px;
  border-radius:100px;font-size:13px;font-weight:600;
  z-index:9999;white-space:nowrap;pointer-events:none;
  transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
#notif.show{transform:translateX(-50%) translateY(0);}

/* ── SECTION LABEL ── */
.sec-label{font-size:11px;color:var(--text4);letter-spacing:0.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px;}

/* ── HERO CARD ── */
.hero-card{
  margin:16px 16px 0;
  background:var(--gradient);
  border-radius:20px;padding:20px;
  position:relative;overflow:hidden;
}
.hero-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08);}
.hero-card::after{content:'';position:absolute;bottom:-20px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.06);}
.hero-eyebrow{font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;}
.hero-pts{font-size:52px;font-family:var(--font-display);color:#fff;line-height:1;margin-top:4px;}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;}
.hero-chips{display:flex;gap:8px;margin-top:14px;}
.hero-chip{background:rgba(0,0,0,0.25);border-radius:8px;padding:6px 12px;}
.hero-chip-lbl{font-size:10px;color:rgba(255,255,255,0.6);}
.hero-chip-val{font-size:16px;font-family:var(--font-display);color:#fff;}

/* ── GLASS CARD ── */
.glass-card{
  background:var(--surface);border-radius:16px;
  padding:16px;border:1px solid var(--border);
}
.glass-card-sm{
  background:var(--surface);border-radius:14px;
  padding:12px 14px;border:1px solid var(--border);
}

/* ── ACCENT CARD ── */
.accent-card{
  background:var(--gradientCard);
  border:1px solid rgba(0,245,147,0.15);
  border-radius:16px;padding:14px 16px;
}

/* ── BUTTONS ── */
.btn-primary{
  width:100%;padding:14px;border-radius:14px;
  background:var(--gradient);border:none;
  color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:0.04em;
  box-shadow:0 4px 20px var(--accentGlow);
  font-family:var(--font-body);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:active{transform:scale(0.97);box-shadow:0 2px 10px var(--accentGlow);}
.btn-ghost{
  padding:10px 20px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;font-family:var(--font-body);
  transition:all .15s;
}
.btn-ghost:active{transform:scale(0.96);}
.btn-ghost.accent{color:var(--accent);border-color:rgba(0,245,147,0.3);}
.btn-ghost.accent2{color:var(--accent2);border-color:rgba(124,58,237,0.3);}
.btn-ghost.gold{color:var(--legend);border-color:rgba(245,158,11,0.3);}
.btn-ghost.danger{color:#f87171;border-color:rgba(248,113,113,0.3);}
.btn-ghost.dim{color:var(--text5);border-color:rgba(255,255,255,0.05);cursor:not-allowed;}
.btn-ghost.full{width:100%;text-align:center;justify-content:center;display:flex;align-items:center;gap:8px;}
.btn-ghost.sm{padding:7px 14px;font-size:12px;border-radius:9px;}

/* ── STAT PILLS ── */
.stat-pills{display:flex;gap:8px;}
.stat-pill{flex:1;background:var(--surface);border-radius:10px;padding:10px 8px;text-align:center;}
.stat-pill-val{font-size:18px;font-weight:700;color:var(--accent);}
.stat-pill-lbl{font-size:10px;color:var(--text4);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}

/* ── PLAYER ROW ── */
.player-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;
}
.player-avatar{
  width:38px;height:38px;border-radius:12px;
  background:var(--gradientCard);
  border:1px solid var(--accentGlow);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;
}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border-radius:14px;
  padding:14px 16px;border:1px solid var(--border);
  margin-bottom:10px;
}

/* ── LEAGUE ROW ── */
.league-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--border2);
  position:relative;
}
.league-row.top{padding-left:10px;}
.league-row.top::before{
  content:'';position:absolute;left:0;top:50%;
  transform:translateY(-50%);
  width:3px;height:24px;border-radius:2px;background:var(--accent);
}

/* ── CARDS ── */
.card-mini{
  flex-shrink:0;width:86px;
  background:var(--surface);
  border:1px solid var(--card-border,var(--border));
  border-radius:14px;padding:8px;text-align:center;
  position:relative;overflow:hidden;transition:transform .15s;
}
.card-mini::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--card-accent,var(--accent)),transparent);opacity:.4;}
.card-mini:active{transform:scale(0.94);}

.card-full{
  width:100%;max-width:230px;min-width:140px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--card-border,var(--border));
  border-radius:20px;overflow:hidden;position:relative;
  box-shadow:0 0 40px var(--card-glow,rgba(0,245,147,.15)),0 20px 60px rgba(0,0,0,.8);
}
.card-full-art{
  width:100%;aspect-ratio:3/4;max-height:220px;position:relative;overflow:hidden;
}
.card-full-art img{
  width:100%;height:100%;object-fit:cover;object-position:center top;display:block;border-radius:12px 12px 0 0;
}

/* ── TRIVIA ── */
.q-opt{
  width:100%;padding:15px 18px;border-radius:14px;text-align:left;
  font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--text3);
  background:var(--surface);border:1px solid var(--border);
  transition:all .2s;min-height:52px;cursor:pointer;
}
.q-opt:hover{border-color:var(--q-color);color:var(--text);background:rgba(255,255,255,0.06);}
.q-opt.correct{border-color:var(--rookie)!important;color:var(--rookie)!important;background:rgba(0,245,147,0.07)!important;}
.q-opt.wrong{border-color:#f87171!important;color:#f87171!important;background:rgba(248,113,113,0.07)!important;}
.q-opt.hidden{opacity:0;pointer-events:none;}
.q-prog{height:3px;border-radius:3px;flex:1;transition:background .3s;}

/* ── STAT BARS ── */
.stat-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.stat-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.xp-bg{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:4px;}
.xp-fill{height:100%;border-radius:2px;background:var(--gradient);}

/* ── PITCH ── */
.pitch-bg{
  background:linear-gradient(180deg,#0a2e14 0%,#0d3d1a 50%,#0a2e14 100%);
  border-radius:20px;padding:16px 8px;
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:2px 7px;font-size:9px;letter-spacing:.5px;}

/* ── API BANNER ── */
.api-banner{
  margin:0 16px 0;
  background:linear-gradient(135deg,rgba(0,245,147,0.08),rgba(124,58,237,0.06));
  border:1px solid rgba(0,245,147,0.15);
  border-radius:16px;padding:14px 16px;
}
.api-input{
  width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:10px 14px;color:var(--text2);
  font-family:monospace;font-size:12px;outline:none;margin-top:10px;
  transition:border-color .2s;
}
.api-input:focus{border-color:var(--accent);}

/* ── PORTRAIT / SHIMMER ── */
.shimmer{
  background:linear-gradient(110deg,#0d0f1e 30%,#181b2e 50%,#0d0f1e 70%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease infinite;
}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
  position:absolute;bottom:8px;right:8px;
}

/* ── OPP ROW ── */
.opp-row{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:13px 16px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;cursor:pointer;transition:all .2s;
}
.opp-row:hover{border-color:rgba(255,255,255,0.15);transform:translateX(3px);}
.opp-row.selected{border-color:var(--legend);background:rgba(245,158,11,0.06);}
.opp-row:active{transform:scale(0.98);}

/* ── EVENT LOG ── */
.event-log{
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:14px;padding:12px;
  max-height:240px;overflow-y:auto;font-size:11px;
}
.event-row{padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;align-items:flex-start;}
.event-row:last-child{border-bottom:none;}

/* ── VIDEO BACKGROUND ── */
.home-video-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;overflow:hidden;
}
.home-video-bg video{
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 1.5s ease;
}
.home-video-bg video.loaded{opacity:1;}
.home-video-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(8,8,15,0.55) 0%,
    rgba(8,8,15,0.35) 30%,
    rgba(8,8,15,0.5)  70%,
    rgba(8,8,15,0.85) 100%
  );
}
/* Lift home screen content above video */
.home-screen-content{position:relative;z-index:1;}
/* Make hero card glass when video is showing */
.video-active .hero-card{
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.video-active .hero-pts{text-shadow:0 2px 20px rgba(0,0,0,0.8);}
.video-active .glass-card{
  background:rgba(8,8,15,0.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.video-active .btn-primary{box-shadow:0 4px 24px rgba(0,245,147,0.4);}

.dev-glow{box-shadow:0 0 20px rgba(0,245,147,.3),0 0 60px rgba(0,245,147,.1)!important;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .4s cubic-bezier(.2,.8,.4,1) forwards;}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}

/* Stagger */
.stagger>*{opacity:0;animation:fadeUp .4s cubic-bezier(.2,.8,.4,1) forwards;}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.12s}
.stagger>*:nth-child(4){animation-delay:.16s}
.stagger>*:nth-child(5){animation-delay:.2s}
.stagger>*:nth-child(6){animation-delay:.24s}
</style>
</head>
<body>
<div id="root">
  <div id="notif">Message</div>
  <div id="header">
    <div class="header-inner">
      <div>
        <div class="header-sub" id="header-sub">Footy Cards</div>
        <div class="header-title" id="header-title">Dashboard</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;"><button id="lang-btn" onclick="cycleLang()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:4px 9px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;font-family:var(--font-body);letter-spacing:0.04em;" title="Switch language">🌐 EN</button><div class="header-avatar" id="header-pts">500</div></div>
    </div>
  </div>
  <div id="screen-wrap"><div id="app"></div></div>
  <nav id="nav">
    <button class="nav-btn active" data-screen="home" onclick="navTo('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12L12 4l9 8v9h-6v-5H9v5H3v-9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span class="nav-label" id="nl-home">Home</span>
    </button>
    <button class="nav-btn" data-screen="trivia" onclick="startRound()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 8v4l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="nav-label" id="nl-trivia">Trivia</span>
    </button>
    <button class="nav-btn" data-screen="match" onclick="navTo('match')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12h16M12 4l8 8-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="nav-label" id="nl-match">Match</span>
    </button>
    <button class="nav-btn" data-screen="collection" onclick="navTo('collection')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 4h12a2 2 0 012 2v14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="nav-label" id="nl-cards">Cards</span>
    </button>
    <button class="nav-btn" data-screen="league" onclick="startLeague()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 20V10m6 10V4m6 16v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="nav-label" id="nl-league">League</span>
    </button>
  </nav>
</div>

<script>

// I18N
// ══════════════════════════════════════════════════════════
const LANGS=["EN","DA","ES"];
let _lang=localStorage.getItem("fc_lang")||"EN";
const TRANSLATIONS={
  EN:{

    screen_team_sub:"My Squad",screen_team_title:"Team Builder",
    screen_league_sub:"Footy Cards",screen_league_title:"League Table",

    daily_claimed:"✅  Daily Bonus Claimed",daily_unclaimed:"🎁  Claim Daily Bonus  ·  +100 pts",

    audience_poll:"📊 Audience Poll",
    perfect:"Perfect round!",great:"Great effort!",keep_going:"Keep practising!",better_luck:"Better luck next time!",
    cards_earned:"🃏 Cards Earned",no_cards:"No cards this round. Keep trying! 💪",
    answer_prefix:"Answer: ",

function detectLocalLeague(){
  try{
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||"";
    // Extract country hint from timezone (e.g. "Europe/Copenhagen" → "DK")
    const tzMap={
      "Europe/Copenhagen":"DK","Europe/Stockholm":"SE","Europe/Oslo":"NO",
      "Europe/London":"GB","Europe/Madrid":"ES","Europe/Berlin":"DE",
      "Europe/Rome":"IT","Europe/Paris":"FR","Europe/Amsterdam":"NL",
      "Europe/Lisbon":"PT","America/New_York":"US","America/Los_Angeles":"US",
      "America/Chicago":"US","America/Sao_Paulo":"BR","America/Argentina/Buenos_Aires":"AR",
      "America/Mexico_City":"MX","Asia/Tokyo":"JP","Australia/Sydney":"AU",
    };
    const cc=tzMap[tz];
    if(!cc) return null;
    const lid=LOCAL_LEAGUE_MAP[cc];
    if(!lid) return null;
    // Check if it's already in LEAGUES list
    const known=LEAGUES.find(l=>l.id===lid);
    if(known) return known;
    // Return synthetic entry for local league
    const flags={DK:"🇩🇰",SE:"🇸🇪",NO:"🇳🇴",US:"🇺🇸",MX:"🇲🇽",BR:"🇧🇷",AR:"🇦🇷",JP:"🇯🇵",AU:"🇦🇺"};
    return {id:lid, flag:flags[cc]||"🏟️", name:LOCAL_LEAGUE_NAMES[lid]||lid, country:cc, local:true};
  }catch(e){return null;}
}

// UTILS
// ══════════════════════════════════════════════════════════
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rf=arr=>arr[Math.floor(Math.random()*arr.length)];

function genCard(diff){
  const pos=rf(POSITIONS),isGK=pos==="GK";
  const skills=isGK?SKILL_GK:SKILL_FIELD;
  const [lo,hi]=diff==="easy"?[45,65]:diff==="medium"?[65,82]:[82,99];
  const overall=ri(lo,hi);
  const stats={};
  skills.forEach(s=>stats[s]=ri(Math.max(40,overall-15),Math.min(99,overall+10)));
  return{
    id:Date.now()+Math.random(), name:`${rf(FIRST)} ${rf(LAST)}`,
    position:pos, nationality:rf(NATS), overall, stats, difficulty:diff, theme:THEMES[diff],
    jersey:rf(JERSEY_COLORS), skinTone:rf(SKIN_TONES), hairStyle:rf(HAIR_STYLES),
    xp:0, level:1, matches:0, goals:0, assists:0, achievements:[],
    portrait:null, portraitLoading:false,
  };
}
function genBotTeam(){
  return ["easy","easy","easy","medium","medium","medium","hard","hard","hard","easy","medium"]
    .map((d,i)=>{const c=genCard(d);c.position=POSITIONS[i];return c;});
}
function teamAvg(cards){return cards.length?Math.round(cards.reduce((s,c)=>s+c.overall,0)/cards.length):0;}
function xpPct(card){return Math.min(100,Math.round((card.xp%XP_PER_LEVEL)/XP_PER_LEVEL*100));}
function grantXP(card,amount){
  const changes=[];
  card.xp=(card.xp||0)+amount;
  const newLevel=Math.floor(card.xp/XP_PER_LEVEL)+1;
  if(newLevel>(card.level||1)){
    card.level=newLevel;
    const keys=Object.keys(card.stats);
    const key=rf(keys);
    const gain=card.difficulty==="easy"?ri(1,3):card.difficulty==="medium"?ri(1,2):1;
    if(card.stats[key]<99){
      card.stats[key]=Math.min(99,card.stats[key]+gain);
      const vals=Object.values(card.stats);
      const newOvr=Math.min(99,Math.round(vals.reduce((a,b)=>a+b,0)/vals.length));
      const ovrGain=newOvr-card.overall;
      card.overall=newOvr;
      changes.push({stat:key,gain,ovrGain});
      if(ovrGain>=3)grantAch(card,"breakout");
    }
  }
  if(card.xp>=100)grantAch(card,"century");
  return changes;
}
function grantAch(card,key){
  if(!card.achievements)card.achievements=[];
  if(!card.achievements.includes(key)){card.achievements.push(key);return true;}
  return false;
}

async function fetchPortrait(card){
  if(card.portrait||card.portraitLoading)return;
  if(IN_SANDBOX){fallback(card);return;}
  card.portraitLoading=true;
  updatePortraitEl(card.id,"loading",null,card);
  const nat=card.nationality.replace(/[^\w ]/g,"").trim();
  const tier=card.difficulty==="hard"?"elite veteran star":card.difficulty==="medium"?"professional":"young rising talent";
  const pose=ACTION_POSES[card.position]||ACTION_POSES.default;
  const col=colorName(card.jersey);
  const foil=card.difficulty==="hard"?"rose gold holographic foil border":card.difficulty==="medium"?"silver holographic foil border":"bronze foil border";
  const prompt=`Photorealistic soccer trading card, official premium sports card design, ${tier} ${nat} footballer, ${card.skinTone} skin tone, ${card.hairStyle} hair, ${pose}, professional stadium background with bokeh blurred crowd, dynamic motion blur on feet and ball, official kit with ${col} jersey, card with ${foil}, holographic shimmer texture on card surface, sharp focus on face, 4K ultra-detailed, sports photography style, Canon EF 85mm f1.4 lens, shallow depth of field, dramatic stadium lighting, cinematic`;
  try{
    const res=await fetch("/.netlify/functions/generate-art",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,parameters:{num_inference_steps:4,width:512,height:768}})
    });
    if(!res.ok){console.warn("Art function error:",res.status);fallback(card);return;}
    const blob=await res.blob();
    const reader=new FileReader();
    reader.onload=()=>{
      card.portrait=reader.result;
      card.portraitLoading=false;
      updatePortraitEl(card.id,"done",card.portrait,card);
      updateMiniCardAvatar(card);
    };
    reader.onerror=()=>fallback(card);
    reader.readAsDataURL(blob);
  }catch(e){console.warn("fetchPortrait failed:",e);fallback(card);}
}

// ══════════════════════════════════════════════════════════
// MATCH ENGINE
// ══════════════════════════════════════════════════════════
function simulateMatch(myTeam,oppTeam,oppName){
  const myAvg=teamAvg(myTeam),oppAvg=teamAvg(oppTeam);
  const events=[];let myG=0,oppG=0;
  const mins=[5,12,18,24,31,38,44,51,58,65,72,80,85,90].sort(()=>Math.random()-.5).slice(0,ri(8,12)).sort((a,b)=>a-b);
  const attackers=myTeam.filter(c=>["ST","LW","RW","CAM"].includes(c.position));
  const defenders=myTeam.filter(c=>["CB","LB","RB","GK"].includes(c.position));
  const mids=myTeam.filter(c=>c.position==="CM");
  const all=myTeam.length?myTeam:[genCard("easy")];
  const pEv={};
  for(const min of mins){
    const myC=Math.max(0.12,Math.min(0.65,0.35+(myAvg-oppAvg)*0.005));
    const opC=Math.max(0.1,Math.min(0.6,0.3+(oppAvg-myAvg)*0.005));
    const roll=Math.random();
    if(roll<myC){
      const sc=rf(attackers.length?attackers:all);
      const as=rf(mids.length?mids:all.filter(c=>c.id!==sc.id));
      myG++;pEv[sc.id]=pEv[sc.id]||{g:0,a:0};pEv[sc.id].g++;
      if(as&&as.id!==sc.id){pEv[as.id]=pEv[as.id]||{g:0,a:0};pEv[as.id].a++;}
      events.push({type:"goal_my",text:`${min}' ⚽ ${sc.name} ${rf(GOAL_ACTIONS)}${as&&as.id!==sc.id?" ("+as.name.split(" ")[1]+"▶)":""}`});
    }else if(roll<myC+opC){
      oppG++;events.push({type:"goal_opp",text:`${min}' ⚽ ${oppName} score!`});
    }else if(Math.random()<0.45){
      const def=rf(defenders.length?defenders:all);
      events.push({type:"def",text:`${min}' 🛡️ ${def.name.split(" ")[1]} ${rf(DEF_ACTIONS)}`});
    }else{
      const att=rf(attackers.length?attackers:all);
      events.push({type:"miss",text:`${min}' 😬 ${att.name.split(" ")[1]} ${rf(MISS_ACTIONS)}`});
    }
  }
  let motm=null,motmScore=-1;
  for(const [id,ev] of Object.entries(pEv)){const sc=ev.g*3+ev.a;if(sc>motmScore){motmScore=sc;motm=id;}}
  if(!motm&&myTeam.length)motm=rf(myTeam).id;
  const result=myG>oppG?"win":myG===oppG?"draw":"loss";
  const ptGain=result==="win"?50:result==="draw"?20:5;
  return{myGoals:myG,oppGoals:oppG,result,ptGain,events,playerEvents:pEv,motm,oppName};
}
function applyMatch(matchData){
  const devs=[];
  const prevAch=state.team.map(c=>({id:c.id,ach:[...(c.achievements||[])]}));
  state.team.forEach(card=>{
    card.matches=(card.matches||0)+1;
    const ev=matchData.playerEvents[card.id]||{g:0,a:0};
    card.goals=(card.goals||0)+(ev.g||0);
    card.assists=(card.assists||0)+(ev.a||0);
    let xp=10+(ev.g||0)*15+(ev.a||0)*8+(matchData.result==="win"?10:0)+(card.id===matchData.motm?20:0);
    if(card.position==="GK"&&matchData.oppGoals===0)xp+=15;
    const changes=grantXP(card,xp);
    devs.push({card,changes,xp});
    if((ev.g||0)>=1)grantAch(card,"first_goal");
    if((ev.g||0)>=3)grantAch(card,"hat_trick");
    if(card.position==="GK"&&matchData.oppGoals===0)grantAch(card,"clean_sheet");
    if(card.id===matchData.motm)grantAch(card,"motm");
    if((card.matches||0)>=10)grantAch(card,"veteran");
  });
  const newAch=[];
  state.team.forEach(card=>{
    const prev=prevAch.find(p=>p.id===card.id);
    (card.achievements||[]).forEach(key=>{if(prev&&!prev.ach.includes(key))newAch.push({card,key});});
  });
  return{devs,newAch};
}

function renderHome(){
  const wins=state.matchHistory.filter(m=>m.result==="win").length;
  const draws=state.matchHistory.filter(m=>m.result==="draw").length;
  const losses=state.matchHistory.filter(m=>m.result==="loss").length;

          <span style="font-size:26px;font-family:var(--font-display);letter-spacing:4px;">${lastM.myGoals} – ${lastM.oppGoals}</span>
          <span style="font-size:11px;color:var(--text3);">vs ${lastM.oppName}</span>
        </div>
      </div>
    </div>`:""}

    <!-- Recent cards -->
    ${recent.length?`<div style="padding:20px 16px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="sec-label" style="margin:0;">${t('recent_cards')}</div>
        <button onclick="navTo('collection')" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font-body);">${t('see_all')}</button>
      </div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
        ${recent.map(c=>miniCard(c,state.team.some(t=>t.id===c.id),true)).join("")}
      </div>
    </div>`:""}

    <!-- Quick actions -->
    <div style="padding:16px 16px 0;">
      <div class="sec-label">${t('quick_play')}</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn-primary" onclick="startRound()">${t('btn_trivia')}</button>
        <div style="display:flex;gap:10px;">
          <button class="btn-ghost full accent" onclick="navTo('match')" style="flex:1;backdrop-filter:blur(10px);background:rgba(0,245,147,.08);">${t('btn_match')}</button>

}

function renderTrivia(){
  if(state.triviaLoading) return `<div class="screen fade-up" style="padding:16px 16px 0;">
    ${leaguePickerHTML()}
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;">

      <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;"></div>
    </div>
  </div>`;
  const r=state.round,q=r.questions[r.current],col=DIFF_COLORS[q.diff];
  const ll=r.lifelines;
  const audHTML=state.audiencePoll?`<div class="glass-card" style="margin-bottom:14px;border-color:rgba(124,58,237,.25);">
    <div class="sec-label">${t('audience_poll')}</div>
    ${q.opts.map(o=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
      <span style="color:var(--text2);font-size:11px;min-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o}</span>
      <div style="flex:1;height:12px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;">
        <div style="width:${state.audiencePoll[o]}%;height:100%;background:var(--accent2);border-radius:4px;transition:width 1s;"></div>
      </div>
      <span style="color:var(--accent2);font-size:11px;min-width:26px;">${state.audiencePoll[o]}%</span>
    </div>`).join("")}
  </div>`:"";

  const opts=q.opts.map(o=>{
    const hidden=state.hidden5050.includes(o);
    const cls=state.answered?(o===q.a?"correct":(o===state.chosen?"wrong":"")):"";
    return `<button class="q-opt ${cls} ${hidden?"hidden":""}" style="--q-color:${col};" onclick="answerQ('${o.replace(/'/g,"&#39;")}')" ${state.answered||hidden?"disabled":""}>${o}</button>`;
  }).join("");

  const llBtn=(key,icon,label,fn)=>{
    const ok=ll[key]&&state.points>=30&&!state.answered;
    return `<button class="btn-ghost sm ${ok?"accent2":"dim"}" onclick="${fn}()" ${ok?"":"disabled"}>${icon} ${label}</button>`;
  };

  return `<div class="screen fade-up" style="padding:16px 16px 0;">
    <!-- League picker (only shown before answering Q1) -->
    ${r.current===0&&!state.answered?leaguePickerHTML():''}
    <!-- Progress -->
    <div style="display:flex;gap:6px;margin-bottom:20px;">
      ${[0,1,2].map(i=>`<div class="q-prog" style="background:${i<r.current?"var(--accent)":i===r.current?col:"rgba(255,255,255,.08)"};"></div>`).join("")}
    </div>
    <!-- Diff badge -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <span style="background:${col}18;border:1px solid ${col}44;color:${col};font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600;letter-spacing:1px;">${q.diff.toUpperCase()}</span>
      <span style="font-size:13px;">${"⭐".repeat(THEMES[q.diff].stars)}</span>
      <span style="font-size:10px;color:var(--text4);">+${DIFF_PTS[q.diff]} pts</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text4);">${getLeagueList().find(l=>l.id===state.triviaLeague)?.flag||"🌍"} ${t('q_of',{n:r.current+1})}</span>
    </div>
    <!-- Question -->
    <div class="glass-card" style="min-height:80px;display:flex;align-items:center;margin-bottom:16px;border-color:${col}22;">
      <p style="font-size:16px;line-height:1.55;font-weight:600;color:var(--text);">${q.q}</p>
    </div>
    ${audHTML}
    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">${opts}</div>
    <!-- Result / Lifelines -->
    ${state.answered?`<div class="glass-card" style="text-align:center;border-color:${state.chosen===q.a?"rgba(0,245,147,.25)":"rgba(248,113,113,.25)"};">
      <div style="font-size:28px;margin-bottom:6px;">${state.chosen===q.a?"🎉":"😔"}</div>
      <div style="color:${state.chosen===q.a?"var(--accent)":"#f87171"};font-weight:700;font-size:14px;">
        ${state.chosen===q.a?t('correct_msg',{pts:DIFF_PTS[q.diff]}):t('wrong_msg',{a:q.a})}
      </div>
      <button class="btn-primary" style="margin-top:14px;" onclick="nextQ()">${r.current<2?t('next_q'):t('see_results')}</button>
    </div>`:`
    <div style="border-top:1px solid rgba(255,255,255,.06);padding-top:16px;">
      <div class="sec-label">${t('lifelines')}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${llBtn("fifty","✂️",t('ll_fifty'),"use5050")}
        ${llBtn("phone","📞",t('ll_phone'),"usePhone")}
        ${llBtn("audience","📊",t('ll_audience'),"useAudience")}
      </div>
    </div>`}
  </div>`;
}

function renderReward(){
  const r=state.round,correct=r.answers.filter(a=>a.correct).length;
  const sumHTML=r.answers.map((a,i)=>`
    <div style="display:flex;align-items:flex-start;gap:10px;padding:11px 0;${i<2?"border-bottom:1px solid rgba(255,255,255,.05)":""}">
      <span style="font-size:16px;flex-shrink:0;">${a.correct?"✅":"❌"}</span>
      <div style="flex:1;"><div style="color:var(--text2);font-size:12px;line-height:1.4;">${a.q.q}</div>
      ${!a.correct?`<div style="color:var(--legend);font-size:11px;margin-top:2px;">${t('answer_prefix')}${a.q.a}</div>`:""}</div>
      <span style="color:${DIFF_COLORS[a.q.diff]};font-size:9px;font-weight:600;letter-spacing:1px;">${a.q.diff.toUpperCase()}</span>
    </div>`).join("");

  const cardsHTML=state.lastCards.length
    ?`<div style="padding:0 16px;">
        <div class="sec-label">${t('cards_earned')}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;justify-items:center;">
          ${state.lastCards.map(c=>`<div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;">
            ${fullCard(c)}
            <button class="btn-ghost sm accent" onclick="addToTeam('${c.id}')">${t('btn_add_team')}</button>
          </div>`).join("")}
        </div>
      </div>`
    :`<div style="padding:0 16px;color:var(--text3);text-align:center;">${t('no_cards')}</div>`;

  return `<div class="screen fade-up">
    <div style="text-align:center;padding:24px 16px 20px;">
      <div style="font-size:48px;margin-bottom:8px;">${correct===3?"🏆":correct>=1?"⚽":"😔"}</div>
      <div style="font-size:36px;font-family:var(--font-display);color:var(--text);margin-bottom:4px;">${correct}/3 Correct</div>
      <div style="font-size:12px;color:var(--text3);">${correct===3?t('perfect'):correct===2?t('great'):correct===1?t('keep_going'):t('better_luck')}</div>
    </div>
    <div style="padding:0 16px 20px;">
      <div class="glass-card">${sumHTML}</div>

    ${cardsHTML}
    <div style="padding:20px 16px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="btn-ghost accent" onclick="startRound()">${t('btn_play_again')}</button>
      <button class="btn-ghost" onclick="navTo('collection')">${t('btn_collection')}</button>
      <button class="btn-ghost" onclick="navTo('home')">${t('btn_home')}</button>
    </div>
  </div>`;
}

function renderCollection(){
  const filter=window._cf||"all";
  const filtered=filter==="all"?state.collection:state.collection.filter(c=>c.difficulty===filter);
  const tabs=["all","easy","medium","hard"].map(f=>{
    const col=DIFF_COLORS[f]||"#fff";
    const active=f===filter;
    return `<button class="btn-ghost sm ${active?"":"dim"}" onclick="setCF('${f}')" style="${active?`color:${col};border-color:${col}44;background:${col}0a`:""}">${f==="all"?t('filter_all'):f==="easy"?t('filter_rookie'):f==="medium"?t('filter_pro'):t('filter_legend')}</button>`;
  }).join("");
  const cardsHTML=filtered.length===0
    ?`<div style="text-align:center;padding:40px 0;color:var(--text4);">
        <div style="font-size:40px;margin-bottom:12px;">🃏</div>
        <p style="margin-bottom:16px;">${t('no_cards_yet')}</p>
        <button class="btn-ghost accent" onclick="startRound()">${t('btn_play_now')}</button>
      </div>`
    :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;">
        ${[...filtered].reverse().map(c=>{
          const inT=state.team.some(t=>t.id===c.id);
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            ${fullCard(c)}
            ${inT?`<div style="font-size:10px;color:var(--accent);">${t('in_team')}</div>`
              :`<button class="btn-ghost sm accent" onclick="addToTeam('${c.id}')">+ Team</button>`}
          </div>`;
        }).join("")}
      </div>`;
  return `<div class="screen fade-up">
    <div style="padding:16px 16px 12px;display:flex;gap:8px;flex-wrap:wrap;">${tabs}</div>
    <div style="padding:0 16px;">${cardsHTML}</div>
  </div>`;
}

function renderTeam(){
  const avg=teamAvg(state.team);
  const notIn=state.collection.filter(c=>!state.team.some(t=>t.id===c.id));
  const tGoals=state.team.reduce((s,c)=>s+(c.goals||0),0);
  const tAch=state.team.reduce((s,c)=>s+(c.achievements||[]).length,0);

  const pitchMarkings=`<div style="position:absolute;inset:0;pointer-events:none;">
    <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07);transform:translateX(-50%);"></div>
    <div style="position:absolute;left:50%;top:50%;width:80px;height:80px;border-radius:50%;border:1px solid rgba(255,255,255,.07);transform:translate(-50%,-50%);"></div>
    <div style="position:absolute;left:20%;right:20%;top:0;height:50px;border:1px solid rgba(255,255,255,.07);border-top:none;"></div>
    <div style="position:absolute;left:20%;right:20%;bottom:0;height:50px;border:1px solid rgba(255,255,255,.07);border-bottom:none;"></div>
  </div>`;

  const rows=[
    {label:"FWD",players:state.team.filter(c=>["ST","LW","RW"].includes(c.position))},
    {label:"MID",players:state.team.filter(c=>["CM","CAM"].includes(c.position))},
    {label:"DEF",players:state.team.filter(c=>["CB","LB","RB"].includes(c.position))},
    {label:"GK", players:state.team.filter(c=>c.position==="GK")},
  ];
  const pitchPlayers=rows.map(row=>row.players.length?`<div style="display:flex;justify-content:center;gap:6px;margin-bottom:12px;">
    ${row.players.map(pl=>`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;">
      <div style="width:40px;height:40px;border-radius:12px;background:rgba(0,0,0,0.4);border:1.5px solid ${pl.theme.border};display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px ${pl.theme.glow};">
        ${avSVG(pl,28)}
      </div>
      <div style="background:rgba(0,0,0,0.6);border-radius:6px;padding:2px 5px;text-align:center;max-width:54px;">
        <div style="font-size:9px;color:#ccc;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${pl.name.split(" ")[0]}</div>
        <div style="font-size:10px;font-family:var(--font-display);color:${pl.theme.accent};">${pl.overall}</div>
      </div>
    </div>`).join("")}
  </div>`:"").join("");

  const emptySlots=11-state.team.length;
  const emptyHTML=emptySlots>0?`<div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:8px;">
    ${Array.from({length:emptySlots}).map(()=>`<div style="width:40px;height:40px;border-radius:12px;border:1.5px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.15);font-size:16px;">+</div>`).join("")}
  </div>`:"";

  return `<div class="screen fade-up">
    ${avg?`<div style="padding:16px 16px 0;display:flex;gap:8px;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;flex:1;">
        <div style="font-size:22px;font-family:var(--font-display);color:var(--accent);">${avg}</div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;">${t('label_avg_ovr')}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;flex:1;">
        <div style="font-size:22px;font-family:var(--font-display);color:var(--legend);">${tGoals}</div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;">${t('label_goals')}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;flex:1;">
        <div style="font-size:22px;font-family:var(--font-display);color:var(--pro);">${tAch}</div>
        <div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;">${t('label_badges')}</div>
      </div>
    </div>`:""}
    <div style="padding:16px 16px 0;">
      <div class="pitch-bg" style="position:relative;">
        ${pitchMarkings}
        <div style="position:relative;z-index:1;">${pitchPlayers}${emptyHTML}</div>
      </div>
    </div>
    ${notIn.length?`<div style="padding:16px 16px 0;">
      <div class="sec-label">${t('add_from_coll')}</div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;">
        ${notIn.map(c=>`<div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
          ${miniCard(c,false,true)}
          <button class="btn-ghost sm" style="color:${c.theme.accent};border-color:${c.theme.border};" onclick="addToTeam('${c.id}')">+</button>
        </div>`).join("")}
      </div>
    </div>`
    :state.collection.length===0
      ?`<div style="padding:20px 16px 0;text-align:center;"><button class="btn-ghost accent" onclick="startRound()">${t('earn_first')}</button></div>`
      :`<div style="padding:16px;text-align:center;color:var(--text4);font-size:12px;">${t('all_in_team')}</div>`}
  </div>`;
}

function renderMatch(){
  if(state.team.length<3) return `<div class="screen fade-up" style="padding:40px 16px;text-align:center;">
    <div style="font-size:40px;margin-bottom:12px;">⚽</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:20px;">${t('need_cards')}</div>
    <button class="btn-primary" onclick="startRound()">${t('earn_trivia')}</button>
  </div>`;

  const bots=BOT_NAMES.map((n,i)=>{
    const diff=i<2?"easy":i<4?"medium":"hard";
    const avg=ri(diff==="easy"?40:diff==="medium"?60:75,diff==="easy"?65:diff==="medium"?82:96);
    return{name:n,avg};
  });
  window._bots=bots;
  const myA=teamAvg(state.team);

  return `<div class="screen fade-up">
    <div style="padding:16px 16px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="sec-label" style="margin:0;">${t('your_lineup')}</div>
        <div style="background:var(--gradientCard);border:1px solid var(--accentGlow);border-radius:8px;padding:4px 10px;">
          <span style="font-size:14px;font-family:var(--font-display);color:var(--accent);">AVG ${myA}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;">
        ${state.team.map(c=>miniCard(c,true,true)).join("")}
      </div>
    </div>
    <div style="padding:20px 16px 0;">
      <div class="sec-label">${t('choose_opp')}</div>
      ${bots.map((b,i)=>{
        const diff=b.avg>myA+5?t('diff_tough'):b.avg<myA-5?t('diff_easier'):t('diff_even');
        const col=b.avg>myA+5?"#f87171":b.avg<myA-5?"var(--accent)":"var(--legend)";
        return `<div class="opp-row ${state.chosenOpp===i?"selected":""}" onclick="pickOpp(${i})">
          <span style="font-size:14px;font-weight:600;">${b.name}</span>
          <div style="text-align:right;">
            <div style="color:${col};font-size:13px;font-weight:700;font-family:var(--font-display);">AVG ${b.avg}</div>
            <div style="font-size:10px;color:var(--text4);">${diff}</div>
          </div>
        </div>`;
      }).join("")}
    </div>
    <div style="padding:16px 16px 0;">
      <button class="btn-primary ${state.chosenOpp==null?"":"accent"}" onclick="kickOff()" ${state.chosenOpp==null?"disabled style='opacity:.4;'":""}>${t('btn_kick_off')}</button>
    </div>
  </div>`;
}

function renderMatchReport(){
  const m=state.match; if(!m)return renderHome();
  const col=m.result==="win"?"var(--accent)":m.result==="draw"?"var(--legend)":"#f87171";
  const icon=m.result==="win"?"🏆":m.result==="draw"?"🤝":"💔";
  const evHTML=m.events.map(e=>`<div class="event-row">
    <span style="flex-shrink:0;color:${e.type==="goal_my"?"var(--accent)":e.type==="goal_opp"?"#f87171":e.type==="def"?"#60a5fa":"var(--text4)"};">${e.type==="goal_my"?"⚽":e.type==="goal_opp"?"⚽":e.type==="def"?"🛡️":"💨"}</span>
    <span style="color:${e.type==="goal_my"?"var(--text2)":e.type==="goal_opp"?"#fca5a5":"var(--text4)"};">${e.text}</span>
  </div>`).join("");

  const devs=(m.devData?.devs||[]).filter(d=>d.changes.length>0);
  const devHTML=devs.length?`<div style="padding:0 16px;">
    <div class="sec-label">${t('player_dev')}</div>
    ${devs.map(d=>`<div style="background:var(--surface);border:1px solid rgba(0,245,147,.15);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;">
      ${avSVG(d.card,38)}
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">${d.card.name}</div>
        ${d.changes.map(c=>`<div style="color:var(--accent);font-size:11px;">▲ ${c.stat} +${c.gain}${c.ovrGain>0?" · OVR +"+c.ovrGain:""}</div>`).join("")}
        <div style="color:var(--accent2);font-size:10px;margin-top:1px;">+${d.xp} XP · LVL ${d.card.level}</div>
      </div>
    </div>`).join("")}
  </div>`:"";

  const newAch=m.devData?.newAch||[];
  const achHTML=newAch.length?`<div style="padding:0 16px;">
    <div class="sec-label">${t('new_achievement')}</div>
    ${newAch.map(({card,key})=>`<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:20px;">${ACHIEVEMENTS[key].icon}</span>
      <div><div style="color:var(--legend);font-weight:700;font-size:12px;">${ACHIEVEMENTS[key].label}</div>
      <div style="color:var(--text3);font-size:10px;">${card.name} — ${ACHIEVEMENTS[key].desc}</div></div>
    </div>`).join("")}
  </div>`:"";

  const motmCard=m.motm?state.team.find(c=>c.id==m.motm):null;
  return `<div class="screen fade-up">
    <!-- Score -->
    <div style="padding:16px 16px 0;">
      <div style="background:linear-gradient(135deg,rgba(0,0,0,.4),rgba(10,46,20,.4));border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px;text-align:center;position:relative;overflow:hidden;">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,.01) 28px,rgba(255,255,255,.01) 29px);pointer-events:none;"></div>
        <div style="font-size:11px;color:var(--text4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">Full Time</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div style="font-size:12px;font-weight:600;color:var(--text2);">⭐ Your Team</div>
          <div style="font-size:60px;font-family:var(--font-display);letter-spacing:8px;color:${col};">${m.myGoals}–${m.oppGoals}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text2);">${m.oppName}</div>
        </div>
        <div style="display:inline-block;background:${col}18;border:1px solid ${col}44;color:${col};padding:5px 18px;border-radius:8px;font-weight:700;font-size:14px;letter-spacing:2px;">${icon} ${m.result.toUpperCase()} · +${m.ptGain} pts</div>
      </div>
    </div>
    ${motmCard?`<div style="padding:20px 16px 0;">
      <div class="sec-label">${t('man_of_match')}</div>
      <div style="display:flex;justify-content:center;">${fullCard(motmCard,true)}</div>
    </div>`:""}
    <div style="padding:20px 16px 0;">
      <div class="sec-label">${t('match_events')}</div>
      <div class="event-log">${evHTML}</div>
    </div>
    ${devHTML}${achHTML}
    <div style="padding:20px 16px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="btn-ghost accent" onclick="navTo('match')">${t('btn_rematch')}</button>
      <button class="btn-ghost" onclick="navTo('collection')">🃏 Cards</button>
      <button class="btn-ghost" onclick="navTo('home')">${t('btn_home')}</button>
    </div>
  </div>`;
}

function renderLeague(){
  const lg=state.league;
  const myI=lg.standings.findIndex(s=>s.isPlayer),myPos=myI+1;
  const medal=p=>p===1?"🥇":p===2?"🥈":p===3?"🥉":`${p}.`;
  const bonus=myPos===1?150:myPos===2?80:myPos===3?40:0;
  return `<div class="screen fade-up">
    <!-- My position hero -->
    <div class="hero-card">
      <div class="hero-eyebrow">${t('league_week',{n:lg.week})}</div>
      <div class="hero-pts">${medal(myPos)} #${myPos}</div>
      <div class="hero-sub">${myPos===1?"🔥 Leading the league!":myPos===2?"💪 Almost at the top!":myPos===3?"⭐ On the podium!":myPos-3+" places from a bonus!"}</div>
      ${bonus?`<div class="hero-chips"><div class="hero-chip"><div class="hero-chip-lbl">Weekly Bonus</div><div class="hero-chip-val">+${bonus} pts</div></div></div>`:""}
    </div>
    <!-- Standings table -->
    <div style="padding:20px 16px 0;">
      <!-- Header -->
      <div style="display:flex;gap:8px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px;">
        <div style="width:28px;font-size:10px;color:var(--text5);text-align:center;">#</div>
        <div style="flex:1;font-size:10px;color:var(--text5);">${t('col_team')}</div>
        <div style="width:36px;font-size:10px;color:var(--text5);text-align:center;">${t('col_avg')}</div>
        <div style="width:36px;font-size:10px;color:var(--text5);text-align:center;font-weight:700;">${t('col_pts')}</div>
      </div>
      ${lg.standings.map((s,i)=>`
        <div class="league-row ${i<4?"top":""}" style="${s.isPlayer?"background:linear-gradient(90deg,rgba(0,245,147,.05),transparent);":""}">
          ${i<4?"":`<div style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;border-radius:2px;background:${s.isPlayer?"var(--accent)":"transparent"};"></div>`}
          <div style="width:28px;text-align:center;">
            <span style="font-size:13px;font-family:var(--font-display);color:${i<4?"var(--accent)":"var(--text4)"};">${s.pos||i+1}</span>
          </div>
          <div style="flex:1;font-size:13px;font-weight:${s.isPlayer?700:400};color:${s.isPlayer?"var(--accent)":i<4?"var(--text2)":"var(--text3)"};">${s.name}</div>
          <div style="width:36px;text-align:center;font-size:11px;color:var(--text4);">${Math.round(s.avg)}</div>
          <div style="width:36px;text-align:center;">
            <span style="font-size:15px;font-family:var(--font-display);color:${s.isPlayer?"var(--accent)":i<4?"var(--text)":"var(--text3)"};">${s.pts}</span>
          </div>
        </div>`).join("")}
      <!-- UCL badge -->
      <div style="display:flex;align-items:center;gap:6px;margin-top:12px;">
        <div style="width:3px;height:12px;border-radius:2px;background:var(--accent);"></div>
        <span style="font-size:10px;color:var(--text4);">${t('top3_bonus')}</span>
      </div>
    </div>
    <div style="padding:20px 16px 0;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-primary" style="flex:2;" onclick="simulateWeek()">${t('btn_simulate',{n:lg.week+1})}</button>
      <button class="btn-ghost" style="flex:1;" onclick="startRound()">⚽ Trivia</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  const screens={home:renderHome,trivia:renderTrivia,reward:renderReward,collection:renderCollection,team:renderTeam,league:renderLeague,match:renderMatch,matchreport:renderMatchReport};
  app.innerHTML=(screens[state.screen]||renderHome)();
  document.getElementById("screen-wrap").scrollTop=0;
  updateHeader(state.screen);
}

// ══════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════
function navTo(screen){
  state.screen=screen; render();
}
function goTo(s){navTo(s);}

function dismissKeyBanner(){window._keyDismissed=true;render();}

function claimDaily(){
  if(state.dailyClaimed)return;
  state.points+=100; state.dailyClaimed=true;
  notify(t("notif_daily"),"var(--legend)"); render();
}

async function startRound(){
  // Resolve "auto" league on first use
  if(state.triviaLeague==="auto"){
    const local=detectLocalLeague();
    state.triviaLeague=local?local.id:"all";
    localStorage.setItem("fc_league",state.triviaLeague);
  }
  state.triviaLoading=true; state.screen="trivia"; render();
  let qs;
  try{
    qs=await fetchTriviaQuestions(state.triviaLeague);
  }catch(e){
    notify("AI trivia unavailable, using classic questions","var(--legend)");
      console.warn("AI trivia error:",e);
    qs=["easy","medium","hard"].map(diff=>{const q=rf(QUESTIONS[diff]);return{...q,opts:[...q.opts].sort(()=>Math.random()-.5),diff};});
  }
  state.triviaLoading=false;
  state.round={questions:qs,current:0,correct:0,answers:[],lifelines:{fifty:true,phone:true,audience:true}};
  state.answered=false; state.chosen=null; state.hidden5050=[]; state.audiencePoll=null;
  state.screen="trivia"; render();
}

function answerQ(answer){
  if(state.answered)return;
  const r=state.round,q=r.questions[r.current];
  const correct=answer===q.a;
  state.answered=true; state.chosen=answer;
  if(correct)state.points+=DIFF_PTS[q.diff];
  r.answers.push({q,answer,correct});
  if(correct)r.correct++;
  render();
}

function nextQ(){
  const r=state.round;
  if(r.current>=2){
    state.lastCards=r.answers.filter(a=>a.correct).map(a=>genCard(a.q.diff));
    state.collection.push(...state.lastCards); state.screen="reward";
  }else{
    r.current++; state.answered=false; state.chosen=null; state.hidden5050=[]; state.audiencePoll=null; state.screen="trivia";
  }
  render();
}

function use5050(){
  const r=state.round;
  if(!r.lifelines.fifty||state.points<30||state.answered)return;
  state.points-=30; r.lifelines.fifty=false;
  const q=r.questions[r.current];
  state.hidden5050=q.opts.filter(o=>o!==q.a).sort(()=>Math.random()-.5).slice(0,2);
  notify(t("notif_fifty"),"var(--accent2)"); render();
}
function usePhone(){
  const r=state.round;
  if(!r.lifelines.phone||state.points<30||state.answered)return;
  state.points-=30; r.lifelines.phone=false;
  const q=r.questions[r.current];
  const hint=Math.random()<0.8?q.a:rf(q.opts.filter(o=>o!==q.a));
  notify(t("notif_phone_says",{hint}),"#60a5fa"); render();
}
function useAudience(){
  const r=state.round;
  if(!r.lifelines.audience||state.points<30||state.answered)return;
  state.points-=30; r.lifelines.audience=false;
  const q=r.questions[r.current];
  const cp=ri(55,80); let rem=100-cp;
  const poll={[q.a]:cp};
  q.opts.filter(o=>o!==q.a).forEach((o,i,arr)=>{const p=i===arr.length-1?rem:ri(0,rem);poll[o]=p;rem-=p;});
  state.audiencePoll=poll;
  notify(t("notif_audience"),"var(--accent2)"); render();
}

function addToTeam(cardId){
  const card=state.collection.find(c=>c.id==cardId);
  if(!card)return;
  if(state.team.some(c=>c.id===card.id)){notify(t("notif_already_team"),"var(--legend)");return;}
  if(state.team.length>=11){
    const weakest=[...state.team].sort((a,b)=>a.overall-b.overall)[0];
    if(card.overall>weakest.overall){state.team=state.team.filter(c=>c.id!==weakest.id);state.team.push(card);notify(t("notif_replaced",{name:weakest.name.split(" ")[1]}),"var(--accent)");}
    else{notify(t("notif_too_weak"),"var(--legend)");return;}
  }else{state.team.push(card);notify(t("notif_added",{name:card.name}),"var(--accent)");}
  render();
}

function startLeague(){
  if(state.team.length<3){notify(t("notif_need3"),"var(--legend)");return;}
  const myAvg=teamAvg(state.team);
  const bots=BOT_NAMES.map(name=>{const t=genBotTeam();return{name,avg:teamAvg(t),pts:ri(0,180),isPlayer:false};});
  const standings=[{name:"⭐ Your Team",avg:myAvg,pts:0,isPlayer:true},...bots].sort((a,b)=>b.pts-a.pts).map((s,i)=>({...s,pos:i+1}));
  state.league={standings,week:1}; state.screen="league"; render();
}
function simulateWeek(){
  const lg=state.league;
  const upd=lg.standings.map(s=>({...s,pts:s.pts+(s.isPlayer?Math.round((s.avg/70)*ri(8,25)):ri(5,30))})).sort((a,b)=>b.pts-a.pts).map((s,i)=>({...s,pos:i+1}));
  const myPos=upd.findIndex(s=>s.isPlayer)+1;
  const bonus=myPos===1?150:myPos===2?80:myPos===3?40:0;
  if(bonus){state.points+=bonus;notify(t("notif_bonus",{pts:bonus}),"var(--legend)");}
  state.league={standings:upd,week:lg.week+1}; render();
}

function setCF(f){window._cf=f;render();}
function pickOpp(i){state.chosenOpp=i;render();}

function kickOff(){
  if(state.chosenOpp==null||!window._bots)return;
  const opp=window._bots[state.chosenOpp];
  const oppTeam=genBotTeam();
  const matchData=simulateMatch(state.team,oppTeam,opp.name);
  const devData=applyMatch(matchData);
  matchData.devData=devData;
  state.points+=matchData.ptGain;
  state.match=matchData;
  state.matchHistory.push({result:matchData.result,myGoals:matchData.myGoals,oppGoals:matchData.oppGoals,oppName:matchData.oppName,ptGain:matchData.ptGain});
  state.chosenOpp=null; state.screen="matchreport";
  if(matchData.result==="win")notify(t("notif_win",{pts:matchData.ptGain}),"var(--accent)");
  else if(matchData.result==="draw")notify(t("notif_draw",{pts:matchData.ptGain}),"var(--legend)");
  else notify(t("notif_loss",{pts:matchData.ptGain}),"#f87171");
  render();
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
